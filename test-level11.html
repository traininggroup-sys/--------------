<!doctype html>
<html>
  <head>
    <title>Debug Level 11 Password</title>
  </head>
  <body>
    <h1>🔍 Debug كلمة مرور المستوى 11</h1>
    <button onclick="testPassword()">اختبر كلمة "7"</button>
    <div id="result"></div>
    <script>
      function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          const char = str.charCodeAt(i);
          hash = (hash << 5) - hash + char;
          hash = hash & hash;
        }
        return Math.abs(hash).toString(16).padStart(8, "0");
      }

      const obfuscatedHash11 = atob("MDAwMDAwMDM3");

      function testPassword() {
        const pass = "7";
        const trimmedPass = pass.trim();
        const inputHash = simpleHash(trimmedPass);

        console.log("=== DEBUG ===");
        console.log("مدخل:", JSON.stringify(trimmedPass));
        console.log("طول المدخل:", trimmedPass.length);
        console.log("الهاش المحسوب:", inputHash);
        console.log("الهاش المتوقع:", obfuscatedHash11);
        console.log("المطابقة:", inputHash === obfuscatedHash11);

        document.getElementById("result").innerHTML = `
        <h3>نتيجة الاختبار:</h3>
        <p><strong>مدخل:</strong> "${trimmedPass}"</p>
        <p><strong>هاش محتسب:</strong> <code>${inputHash}</code></p>
        <p><strong>هاش متوقع:</strong> <code>${obfuscatedHash11}</code></p>
        <p style="color: ${inputHash === obfuscatedHash11 ? "green" : "red"}; font-size: 24px;">
          ${inputHash === obfuscatedHash11 ? "✅ المطابقة صحيحة!" : "❌ مش مطابق"}
        </p>
        <p><strong>F12 Console:</strong> شوف DEBUG التفصيلي</p>
      `;

        if (inputHash === obfuscatedHash11) {
          alert("✅ الكود شغال تمام! المشكلة في مكان تاني");
        } else {
          alert("❌ خطأ في الهاش - شوف Console");
        }
      }

      console.log("Expected hash:", obfuscatedHash11);
      console.log('simpleHash("7"):', simpleHash("7"));
    </script>
  </body>
</html>
