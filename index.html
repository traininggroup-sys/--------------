 <!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>اختبار المستوى - جروب المشتركين</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
 
  </head>

  <body>
    <div class="container">
      <header>
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
          <div>
            <h1>مستوياتي - جروب المشتركين</h1>
            <h3>معانا هتذاكر وتكسب كمان🔥✨</h3>
          </div>
          <a
            href="admin.html"
            class="back-btn1"
id="admin-btn"
            style="text-decoration: none;"
            >⚙️</a
          >
        </div>

        <div class="top-controls">
          <div class="coin-container" id="header-coins" style="display: none;">
            <img src="جنيه.jpg" id="egypounds" />
            <span>كسبت:</span>
            <span id="coin-count">جنيه </span>
          </div>
          <button id="leaderboard-btn" style="display: none" class="back-btn">
            🏆 المتصدرين
          </button>
        </div>
      </header>

      <section id="login-section" class="show">
        <div class="login-content">
          <div class="input-row">
            <input id="username" placeholder="اكتب اسمك ثلاثي" type="text" />
            <input id="password" placeholder="اكتبت رقمك المفضل" type="password" />
            <button id="login-btn">دخول / إنشاء حساب</button>
          </div>
        </div>
        <div class="coin-container" id="login-coins" style="display: none; margin-top: 15px; justify-content: center;">
          <img src="جنيه.jpg" id="egypounds-login" />
          <span>حوشت كام:</span>
          <span id="coin-count-login">جنيه </span>
        </div>
      </section>

      <section id="levels"></section>

      <div class="levels-container" style="text-align: center; margin-top: 20px; width: 100%; max-width: 600px;">
        <button id="logout-btn" class="logout-btn">
          🚪 خروج
        </button>
      </div>

      <section id="question-box">
        <div id="question-info"></div>

        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>

        <h2 id="question-text">سؤال هنا</h2>

        <form id="quizForm">
          <div id="answers"></div>

          <div style="text-align: left; margin-top: 20px">
            <button id="next-q-btn">السؤال التالي ⬅️</button>
          </div>
        </form>

        <div id="tip"></div>
      </section>
      <div id="leaderboard" aria-hidden="true">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
          "
        >
          <h2>لوحة المتصدرين</h2>
          <button id="close-leaderboard-btn" class="back-btn">⬅️ رجوع</button>
        </div>
        <div id="leaderboard-list">جارٍ التحميل...</div>
      </div>

      <div id="level-modal" class="level-modal">
        <button id="close-modal" class="close-modal">×</button>
        <h3>المستوى <span id="modal-level-number"></span></h3>
        <p id="modal-pass-rate"></p>
        <p id="modal-questions-count"></p>
        <p id="modal-encouragement">معانا هتذاكر وتكسب كمان! 🔥✨</p>
        <p id="modal-price" style="display: none"></p>
        <div class="modal-buttons">
          <button id="modal-start-btn">ابدأ</button>
          <button id="modal-buy-btn" style="display: none">شراء</button>
        </div>
      </div>

      <div id="toast" class="toast">
        <strong id="toast-title"></strong
        ><span id="toast-msg" style="margin-inline-start: 8px"></span>
      </div>

      <audio id="correct-sound">
        <source
          src="data:audio/mpeg;base64,//uQZAAAAAAAAAAAAAAAAAAAA..."
          type="audio/mpeg"
        />
      </audio>
      <audio id="wrong-sound">
        <source
          src="data:audio/mpeg;base64,//uQZAAAAAAAAAAAAAAAAAAAA..."
          type="audio/mpeg"
        />
      </audio>
    </div>
    <div
      id="result-section"
      class="hidden"
      style="display: none; padding: 20px; direction: rtl"
    >
      <div id="result-header" style="text-align: center; margin-bottom: 20px">
        <h2 id="result-title">نتيجة الاختبار</h2>
        <p id="result-stats" style="font-size: 20px; font-weight: bold"></p>
        <p id="result-feedback" style="font-size: 18px; color: #007bff"></p>
      </div>
      <div id="answers-review"></div>
      <div style="display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap;">
        <button
          onclick="backToLevelsFromResults()"
          style="
            padding: 15px 30px;
            font-size: 18px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            flex: 1;
            min-width: 200px;
            max-width: 300px;
          "
        >
          🏠 العودة لصفحة المستويات
        </button>
      </div>

</parameter>
    </div>
    <!-- Firebase و كود التطبيق (سكربت واحد فقط) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        get,
        set,
        update,
        onValue,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

      // إعدادات Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyDrPR-5-IaSD7-ij1oj3Y4M9ARQBMK66eo",
        authDomain: "levels-409ba.firebaseapp.com",
        databaseURL: "https://levels-409ba-default-rtdb.firebaseio.com",
        projectId: "levels-409ba",
        storageBucket: "levels-409ba.firebasestorage.app",
        messagingSenderId: "54945336454",
        appId: "1:54945336454:web:51e6f513c1d2a91e23d507",
        measurementId: "G-ZWME5X472Z",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // --- عناصر الواجهة (DOM) ---
      const loginSection = document.getElementById("login-section");
      const levelsDiv = document.getElementById("levels");
      const questionBox = document.getElementById("question-box");
      const answersDiv = document.getElementById("answers");
      const resultSection = document.getElementById("result-section");
      const leaderboardCard = document.getElementById("leaderboard");
      const lbList = document.getElementById("leaderboard-list");
      const leaderboardBtn = document.getElementById("leaderboard-btn");
      const logoutBtn = document.getElementById("logout-btn");
      const closeLeaderboardBtn = document.getElementById(
        "close-leaderboard-btn",
      );
      const coinCountEl = document.getElementById("coin-count");
      const coinCountLoginEl = document.getElementById("coin-count-login");
      const loginBtn = document.getElementById("login-btn");
      const headerCoins = document.getElementById("header-coins");
      const loginCoins = document.getElementById("login-coins");
const adminBtn = document.getElementById("admin-btn");

      // --- حدث زر الأدمن ---
      if (adminBtn) {
        adminBtn.addEventListener("click", (e) => {
          e.preventDefault();
          const password = prompt("أدخل كلمة المرور:");
          if (password === "1") {
            window.location.href = "admin.html";
          } else if (password !== null) {
            showToast("⚠️", "كلمة المرور غير صحيحة", "err");
          }
        });
      }

      // التوست
      const toastEl = document.getElementById("toast"),
        toastTitle = document.getElementById("toast-title"),
        toastMsg = document.getElementById("toast-msg");

      // --- حالة التطبيق ---
      let currentUser = null;
      let currentLevel = 1;
      let currentQuestionIndex = 0;
      let currentQuestions = [];
      let correctAnswers = 0;
      let userCoins = 0;
      let userAnswers = [];
      let levelTimer = null;
      let timeLeft = 0;
      let selectedOptionIndex = null;
      let leaderboardUnsubscribe = null;

      const levelsData = {
        1: { questions: 5, passRate: 0.6, time: 600},
        2: { questions: 5, passRate: 0.65, time: 60 },
        3: { questions: 5, passRate: 0.7, time: 60 },
        4: { questions: 5, passRate: 0.75, time: 60 },
        5: { questions: 5, passRate: 0.8, password: "admin", time: 60 },
        6: { questions: 5, passRate: 0.85, password: "admin", time: 60 },
        7: { questions: 5, passRate: 0.9, password: "admin", time: 60 },
        8: { questions: 5, passRate: 0.95, password: "admin", time: 60 },
        9: { questions: 5, passRate: 1.0, password: "admin", time: 60 },
        10: { questions: 5, passRate: 1.0, password: "admin", time: 60 },
        11: { questions: 5, passRate: 1.0, password: "admin", time: 60 },
      };

      // --- وظائف المساعدة والوقت ---
      function updateTimerDisplay() {
        const questionInfoEl = document.getElementById("question-info");
        const progressFill = document.querySelector(".progress-fill");
        const totalTime = levelsData[currentLevel].time;
        const progressPercent = (timeLeft / totalTime) * 100;

        if (progressFill) progressFill.style.width = progressPercent + "%";

        questionInfoEl.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <span>السؤال ${currentQuestionIndex + 1} من ${currentQuestions.length}</span>
        <div id="timer" style="color: ${timeLeft < 10 ? "red" : "var(--accent-secondary)"}; font-weight: bold;">
          ⏳ ${timeLeft} ثانية
        </div>
      </div>
    `;
      }

      function updateTimer() {
        timeLeft--;
        if (timeLeft <= 0) {
          clearInterval(levelTimer);
          showToast("⏰", "انتهى الوقت!", "err");
          endLevel();
        } else {
          updateTimerDisplay();
        }
      }

      // --- نظام الأسئلة ---
      async function loadQuestionsFromDB(level) {
        const questionsRef = ref(db, `questions/${level}`);
        const snapshot = await get(questionsRef);
        if (snapshot.exists()) {
          const questionsArray = Object.values(snapshot.val());
          return questionsArray.map((q) => ({
            ...q,
            q: decodeText(q.q),
            options: q.options.map((opt) => decodeText(opt)),
            tip: q.tip ? decodeText(q.tip) : q.tip,
          }));
        }
        return [];
      }

      function renderQuestion() {
        const q = currentQuestions[currentQuestionIndex];
        if (!q) {
          endLevel();
          return;
        }

        selectedOptionIndex = null;
        document.getElementById("question-text").textContent = q.q;
        answersDiv.innerHTML = "";
        updateTimerDisplay();

        q.options.forEach((opt, i) => {
          const label = document.createElement("label");
          label.className = "answer-label";
          label.dataset.value = i;
          label.innerHTML = `
        <input type="radio" name="quiz-opt" value="${i}">
        <span>${opt}</span>
      `;
          label.addEventListener("click", (e) => {
            // Prevent double triggering
            e.stopPropagation();
            const allLabels = answersDiv.querySelectorAll("label");
            allLabels.forEach((l) => l.classList.remove("selected-opt"));
            label.classList.add("selected-opt");
            // Also check the radio button
            const radio = label.querySelector('input[type="radio"]');
            if (radio) radio.checked = true;
            selectedOptionIndex = i;
          });
          answersDiv.appendChild(label);
        });
      }

      // زر التالي الموحد
      document.getElementById("next-q-btn").addEventListener("click", (e) => {
        e.preventDefault(); // منع إعادة تحميل الصفحة
        if (selectedOptionIndex === null) {
          showToast("⚠️", "يرجى اختيار إجابة أولاً", "warn");
          return;
        }

        const q = currentQuestions[currentQuestionIndex];
        userAnswers.push({
          questionIndex: currentQuestionIndex,
          userChoice: selectedOptionIndex,
          correct: selectedOptionIndex === q.answer,
        });

        if (selectedOptionIndex === q.answer) correctAnswers++;

        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuestions.length) {
          renderQuestion();
        } else {
          endLevel();
        }
      });

      // --- تسجيل الدخول ---
      loginBtn.addEventListener("click", async () => {
        const username = document
          .getElementById("username")
          .value.trim()
          .toLowerCase();
        const password = document.getElementById("password").value.trim();
        if (!username || !password) {
          showToast("تنبيه", "يرجى إدخال اسم المستخدم وكلمة المرور", "warn");
          return;
        }

        // التحقق من كلمة مرور الأدمن
        if (username === "admin" && password === "admin123") {
          window.location.href = "admin.html";
          return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = "جاري التحميل...";

        try {
          const userRef = ref(db, "users/" + sanitizeFirebaseKey(username));
          const snapshot = await get(userRef);
          if (snapshot.exists()) {
            const data = snapshot.val();
            if (data.password === password) {
              currentUser = {
                username,
                passedLevels: data.passedLevels || [],
                coins: data.coins || 0,
              };
              userCoins = data.coins || 0;
              coinCountEl.textContent = userCoins + " جنيه";
              showLevels();
            } else {
              showToast("خطأ", "كلمة المرور غير صحيحة", "err");
            }
          } else {
            await set(userRef, { password, passedLevels: [], coins: 0 });
            currentUser = { username, passedLevels: [], coins: 0 };
            userCoins = 0;
            coinCountEl.textContent = "0 جنيه";
            showLevels();
          }
        } catch (e) {
          showToast("خطأ", "حدث خطأ في قاعدة البيانات", "err");
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = "دخول / إنشاء حساب";
        }
      });

      // --- كلمات تشجيعية لكل مستوى ---
      const encouragementMessages = {
        1: "ابدأ رحلتك التعليمية الآن! 🌟\nقدها وقدودك! 💪",
        2: "أنت على الطريق الصحيح! 🚀\nواصل التقدم! ⭐",
        3: "مستواك يرتفع! 📈\nأثبت جدارتك! 🏆",
        4: "التحدي يزداد! 🎯\nأنت قادر على النجاح! 💫",
        5: "نصف الطريق! 🌍\nاقتربت من النجاح! 🔥",
        6: "مستوى متقدم! 🎓\nاستمر بنفس القوة! 💪",
        7: "أنت naheee! ⭐\nقمة النجاح تنتظرك! 🏔️",
        8: "مستوى صعب! 🧠\nعقلك حاد! 🔮",
        9: "على أعتاب التميز! 👑\nأنت بطل! 🏅",
        10: "المستوى قبل الأخير! 🌟\nاقتربت من النهاية! 🎉",
        11: "الخطوة الأخيرة! 🏁\nأنت تستحق الت庆祝! 🎊"
      };

      // --- عرض الخريطة والمودال ---
      const levelModal = document.getElementById("level-modal");
      const modalStartBtn = document.getElementById("modal-start-btn");
      const closeModalBtn = document.getElementById("close-modal");

      // إغلاق المودال عند الضغط على ×
      closeModalBtn.addEventListener("click", () => {
        levelModal.style.display = "none";
      });

      // إغلاق المودال عند الضغط خارج المحتوى
      levelModal.addEventListener("click", (e) => {
        if (e.target === levelModal) {
          levelModal.style.display = "none";
        }
      });

function showLevels() {
        if (!currentUser) return;
        loginSection.style.display = "none";
        levelsDiv.style.display = "flex";
        if (logoutBtn) logoutBtn.classList.add("show");
        if (leaderboardBtn) leaderboardBtn.style.display = "inline-block";
        if (adminBtn) adminBtn.style.display = "none";
        resultSection.classList.add("hidden");
        levelsDiv.innerHTML = "";
        
        // إظهار الهيدر في صفحة المستويات
        document.querySelector("header").style.display = "block";

        // إظهار عملة الهيدر وإخفاء عملة تسجيل الدخول
        if (headerCoins) headerCoins.style.display = "flex";
        if (loginCoins) loginCoins.style.display = "none";

        // رسالة ترحيبية للمستخدم
        const userCoins = currentUser.coins || 0;
        showToast("🎉", `أهلاً يا ${currentUser.username}! انت محوش ${userCoins} جنيه شد حيلك النهاردة واكسب اكتر`, "success");

        const passed = currentUser.passedLevels || [];
        const highest = passed.length ? Math.max(...passed) : 0;

        Object.keys(levelsData).forEach((lvlStr) => {
          const lvl = +lvlStr;
          const card = document.createElement("div");
          card.className = "level-card";
          let icon = passed.includes(lvl)
            ? "✅"
            : lvl === highest + 1
              ? "🔓"
              : "🔒";

          card.innerHTML = `<div>المستوى ${lvl} ${icon}</div>`;
          card.className = `level-card ${passed.includes(lvl) ? "passed" : lvl === highest + 1 ? "open" : "locked"}`;

          card.addEventListener("click", () => {
            if (lvl > highest + 1) {
              showToast("🔒", "هذا المستوى مغلق", "warn");
              return;
            }
            currentLevel = lvl;
            
            // تحديث محتوى المودال
            document.getElementById("modal-level-number").textContent = lvl;
            
            // النسبة المطلوبة للاجتياز
            const passRatePercent = (levelsData[lvl].passRate * 100).toFixed(0);
            document.getElementById("modal-pass-rate").innerHTML = 
              `<span class="pass-rate-label">النسبة المطلوبة للاجتياز:</span> <span class="pass-rate-value">${passRatePercent}%</span>`;
            
            // عدد الأسئلة
            document.getElementById("modal-questions-count").innerHTML = 
              `<span class="questions-label">عدد أسئلة المستوي:</span> <span class="questions-value">${levelsData[lvl].questions} أسئلة</span>`;
            
            // الكلمة التشجيعية للمستوى
            const encouragement = encouragementMessages[lvl] || "معانا هتذاكر وتكسب كمان! 🔥✨";
            document.getElementById("modal-encouragement").innerHTML = 
              `<span class="encouragement-text">${encouragement.replace(/\n/g, '<br>')}</span>`;
            
            levelModal.style.display = "block";
          });
          levelsDiv.appendChild(card);
        });
      }

      modalStartBtn.addEventListener("click", () => {
        levelModal.style.display = "none";
        startLevel(currentLevel);
      });

async function startLevel(level) {
        if (levelsData[level]?.password) {
          const pass = prompt("أدخل كلمة مرور المستوى:");
          if (pass !== levelsData[level].password) {
            showToast("خطأ", "الباسورد غلط", "err");
            return;
          }
        }

        currentQuestionIndex = 0;
        correctAnswers = 0;
        userAnswers = [];
        levelsDiv.style.display = "none";
        questionBox.style.display = "block";
        resultSection.style.display = "none";
        resultSection.classList.add("hidden");
        if (logoutBtn) logoutBtn.classList.remove("show");
        // إخفاء عملة الهيدر وزر المتصدرين في شاشة الأسئلة
        if (headerCoins) headerCoins.style.display = "none";
        if (leaderboardBtn) leaderboardBtn.style.display = "none";

        currentQuestions = await loadQuestionsFromDB(level);
        timeLeft = levelsData[level].time;
        levelTimer = setInterval(updateTimer, 1000);
        renderQuestion();
      }

      // --- النهاية والنتائج ---
      async function endLevel() {
        clearInterval(levelTimer);
        questionBox.style.display = "none";
        resultSection.style.display = "block";
        resultSection.classList.remove("hidden");
        
        // إخفاء الهيدر في شاشة النتيجة
        document.querySelector("header").style.display = "none";


        // إخفاء عملة الهيدر وزر المتصدرين في صفحة النتيجة
        if (headerCoins) headerCoins.style.display = "none";
        if (leaderboardBtn) leaderboardBtn.style.display = "none";

        const total = currentQuestions.length;
        const passRate = correctAnswers / total;
        const isPassed = passRate >= levelsData[currentLevel].passRate;

        if (isPassed && !currentUser.passedLevels.includes(currentLevel)) {
          currentUser.passedLevels.push(currentLevel);
          userCoins += 1;
          coinCountEl.textContent = userCoins + " جنيه";
          await update(
            ref(db, "users/" + sanitizeFirebaseKey(currentUser.username)),
            {
              passedLevels: currentUser.passedLevels,
              coins: userCoins,
            },
          );
        }

        document.getElementById("result-stats").textContent =
          `النتيجة: ${correctAnswers} من ${total}`;
        const feedback = document.getElementById("result-feedback");
        feedback.textContent = isPassed
          ? "🎉مبروك تم اجتياز المستوي بنجاح!"
          : "⚠️ حاول مرة أخرى";
        feedback.style.color = isPassed ? "green" : "red";

        let reviewHTML = "<h3>مراجعة الإجابات:</h3>";
        currentQuestions.forEach((q, i) => {
          const uAns = userAnswers.find((a) => a.questionIndex === i);
          const correct = uAns?.correct;
          reviewHTML += `
        <div style="padding:10px; border-bottom:1px solid #ddd; background:${correct ? "#f0fff0" : "#fff0f0"}">
          <p><b>س${i + 1}:</b> ${q.q}</p>
          <p style="color:${correct ? "green" : "red"}">إجابتك: ${uAns ? q.options[uAns.userChoice] : "لم تجب"}</p>
          ${!correct ? `<p style="color:green">الصح: ${q.options[q.answer]}</p>` : ""}
        </div>`;
        });
        document.getElementById("answers-review").innerHTML = reviewHTML;
      }

      // العودة للمستويات من شاشة النتائج
      window.backToLevelsFromResults = function () {
        resultSection.style.display = "none";
        resultSection.classList.add("hidden");
        // إظهار الهيدر مرة أخرى
        document.querySelector("header").style.display = "block";
        showLevels();
      };

      // العودة للمستويات من شاشة النتائج (وظيفة جديدة للزر)
      window.logoutFromResult = function () {
        resultSection.style.display = "none";
        resultSection.classList.add("hidden");
        // إظهار الهيدر مرة أخرى
        document.querySelector("header").style.display = "block";
        showLevels();
      };

// --- زر الخروج ---
      if (logoutBtn) {
        logoutBtn.addEventListener("click", () => {
          currentUser = null;
          userCoins = 0;
          coinCountEl.textContent = "جنيه ";
          loginSection.style.display = "block";
          levelsDiv.style.display = "none";
          if (leaderboardBtn) leaderboardBtn.style.display = "none";
          logoutBtn.classList.remove("show");
          // إخفاء عملة الهيدر وإظهار رسالة تسجيل الدخول
          if (headerCoins) headerCoins.style.display = "none";
          document.getElementById("username").value = "";
          document.getElementById("password").value = "";
        });
      }

      // --- وظائف إضافية ---
      // إظهار الهيدر بشكل افتراضي على صفحة تسجيل الدخول
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelector("header").style.display = "block";
      });

      function decodeText(t) {
        try {
          return decodeURIComponent(escape(atob(t)));
        } catch (e) {
          return t;
        }
      }

      function sanitizeFirebaseKey(k) {
        return k.replace(/[.#$\[\]]/g, "_");
      }

      function showToast(title, msg, type) {
        toastTitle.textContent = title;
        toastMsg.textContent = msg;
        toastEl.className = `toast show ${type}`;
        setTimeout(() => toastEl.classList.remove("show"), 2500);
      }

      // --- لوحة المتصدرين ---
      if (leaderboardBtn) {
        leaderboardBtn.addEventListener("click", async () => {
          leaderboardCard.style.display = "block";
          lbList.innerHTML = "جارٍ التحميل...";

          try {
            const usersRef = ref(db, "users");
            const snapshot = await get(usersRef);
            if (snapshot.exists()) {
              const users = Object.entries(snapshot.val()).map(
                ([username, data]) => ({
                  username,
                  passedLevels: data.passedLevels?.length || 0,
                  coins: data.coins || 0,
                }),
              );

              users.sort(
                (a, b) => b.passedLevels - a.passedLevels || b.coins - a.coins,
              );

              let html = "";
              users.slice(0, 20).forEach((user, i) => {
                let rankClass = "";
                if (i === 0) rankClass = "first-place";
                else if (i === 1) rankClass = "second-place";
                else if (i === 2) rankClass = "third-place";

                html += `
                <div class="leader-user ${rankClass}">
                  <span class="rank">${i + 1}</span>
                  <div class="user-info">
                    <div class="user-name">${user.username}</div>
<div class="user-stats">✅ ${user.passedLevels} مستويات | 🪙 ${user.coins} جنيه</div>
                  </div>
                </div>
              `;
              });

              lbList.innerHTML = html || "لا يوجد مستخدمين بعد";
            } else {
              lbList.innerHTML = "لا يوجد مستخدمين بعد";
            }
          } catch (e) {
            lbList.innerHTML = "حدث خطأ في تحميل البيانات";
          }
        });
      }

      if (closeLeaderboardBtn) {
        closeLeaderboardBtn.addEventListener("click", () => {
          leaderboardCard.style.display = "none";
        });
      }
    </script>
  </body>
</html>
