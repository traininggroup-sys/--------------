<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>المحرر الذكي - إدارة الأسئلة</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #007bff;
        --success: #28a745;
        --danger: #dc3545;
        --purple: #6f42c1;
        --bg: #f0f2f5;
      }
      * {
        box-sizing: border-box;
        font-family: "Tajawal", sans-serif;
        direction: rtl;
      }
      body {
        margin: 0;
        padding: 20px;
        background: var(--bg);
        color: #343a40;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
        background: white;
        padding: 30 Arabic px;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        padding: 30px;
      }
      h1,
      h2 {
        text-align: center;
        color: var(--primary);
        margin-top: 0;
      }
      .section {
        border: 1px solid #ddd;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 25px;
        background: #fafafa;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
        color: #555;
      }
      select,
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
      }
      textarea {
        resize: vertical;
        min-height: 250px;
        font-family: "Consolas", monospace;
        direction: ltr;
        text-align: left;
        background: #272822;
        color: #f8f8f2;
        padding: 15px;
        line-height: 1.5;
      }
      .btn-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 15px;
      }
      button {
        flex: 1;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        transition: 0.3s;
        color: white;
        min-width: 150px;
      }
      .btn-load {
        background: var(--primary);
      }
      .btn-save {
        background: var(--success);
      }
      .btn-bulk {
        background: var(--purple);
      }
      .btn-delete {
        background: var(--danger);
      }
      .btn-back {
        background: #6c757d;
        max-width: 200px;
        margin: 20px auto;
        display: block;
        text-decoration: none;
        text-align: center;
        color: white;
        line-height: 45px;
        border-radius: 8px;
        font-weight: bold;
      }
      .toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        border-radius: 50px;
        color: white;
        display: none;
        z-index: 1000;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        font-weight: bold;
      }
      .status-bar {
        font-size: 13px;
        margin-top: 5px;
        color: #666;
        font-weight: bold;
      }
      .badge {
        background: #007bff;
        color: white;
        padding: 2px 8px;
        border-radius: 10px;
        margin: 0 5px;
      }
      .info-note {
        font-size: 12px;
        color: #777;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 9999; font-family: 'Tajawal', sans-serif;">
      <div style="font-size: 24px; margin-bottom: 20px;">🔐 جاري التحقق...</div>
      <div style="width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>

    <div class="container" id="admin-panel" style="display: none;">
      <h1>⚙️ لوحة التحكم الاحترافية

      <div class="section" style="background: #eef6ff">
        <label>إدارة الجوائز لكل مستوى:</label>
        <div style="display: flex; gap: 10px">
          <select id="level-select-prizes" style="flex: 2">
            <script>
              for (let i = 1; i <= 11; i++)
                document.write(`<option value="${i}">المستوى ${i}</option>`);
            </script>
          </select>
          <button class="btn-load" id="btn-fetch-prizes">
            🔍 جلب الجوائز الحالية
          </button>
        </div>
        <div id="prizes-status" class="status-bar"></div>
        <input
          type="number"
          id="prize-input"
          placeholder="قيمة الجائزة بالجنيه"
          style="
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
          "
        />
        <div class="btn-group">
          <button class="btn-save" id="btn-save-prize">
            💾 حفظ جائزة المستوى
          </button>
          <button class="btn-delete" id="btn-reset-prize">
            🔄 إعادة الافتراضي
          </button>
        </div>

        <hr style="margin: 30px 0" />

        <label>اختر المستوى للإدارة:</label>
        <div style="display: flex; gap: 10px">
          <select id="level-select" style="flex: 2">
            <script>
              for (let i = 1; i <= 100; i++)
                document.write(`<option value="${i}">المستوى ${i}</option>`);
            </script>
          </select>
          <button class="btn-load" id="btn-fetch">
            🔍 جلب الأسئلة الحالية
          </button>
        </div>
        <div id="level-status" class="status-bar"></div>
      </div>

      <div class="section">
        <h2>🛠️ محرر الأسئلة المباشر</h2>
        <p class="info-note">
          الأسئلة plain text بدون تشفير. اضغط "حفظ" لتطبيق التغييرات.
        </p>
<textarea id="json-editor" placeholder='[{"question": "سؤال...", "options": ["أ","ب"], "answer": "أ", "explanation": "شرح..."}]'></textarea>
        <div class="btn-group">
          <button class="btn-save" id="btn-save-edit">
            💾 حفظ التعديلات البرمجية
          </button>
          <button class="btn-delete" id="btn-clear-level">
            🗑️ مسح أسئلة المستوى
          </button>
        </div>
      </div>

      <a href="index.html" class="btn-back">🏠 العودة للموقع</a>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
      // Admin Password Protection - Secure direct access
      function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          const char = str.charCodeAt(i);
          hash = (hash << 5) - hash + char;
          hash = hash & hash;
        }
        return Math.abs(hash).toString(16).padStart(8, "0");
      }

      // ADMIN PASSWORD CHECK - Required for access
      const ADMIN_PASSWORD_HASH = "58a01f09"; // simpleHash("11121999")
      const password = prompt("🔐 أدخل كلمة مرور لوحة الإدارة:");

      if (!password || simpleHash(password) !== ADMIN_PASSWORD_HASH) {
        alert("❌ كلمة المرور غير صحيحة! سيتم إعادة التوجيه...");
        setTimeout(() => {
          window.location.href = "index.html";
        }, 2000);
      } else {
        // Success - show panel
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        console.log("✅ Admin access granted");
      }

      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        set,
        get,
        push,
        remove,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

      // إعدادات Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyDrPR-5-IaSD7-ij1oj3Y4M9ARQBMK66eo",
        authDomain: "levels-409ba.firebaseapp.com",
        databaseURL: "https://levels-409ba-default-rtdb.firebaseio.com",
        projectId: "levels-409ba",
        storageBucket: "levels-409ba.firebasestorage.app",
        messagingSenderId: "54945336454",
        appId: "1:54945336454:web:51e6f513c1d2a91e23d507",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      const editor = document.getElementById("json-editor");
      const levelSelect = document.getElementById("level-select");
      const prizesLevelSelect = document.getElementById("level-select-prizes");
      const prizesStatus = document.getElementById("prizes-status");
      const prizeInput = document.getElementById("prize-input");
      const statusBox = document.getElementById("level-status");

      function notify(msg, type = "success") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.style.background = type === "success" ? "#28a745" : "#dc3545";
        t.style.display = "block";
        setTimeout(() => (t.style.display = "none"), 3000);
      }



      // --- إدارة الجوائز ---
      document.getElementById("btn-fetch-prizes").onclick = async () => {
        const level = prizesLevelSelect.value;
        prizesStatus.innerHTML = "جاري التحميل...";
        try {
          const snap = await get(ref(db, `prizes/${level}`));
          const prizeValue = snap.exists() ? snap.val() : null;
          prizeInput.value = prizeValue || "";
          prizesStatus.innerHTML = prizeValue
            ? `الجائزة الحالية: <span class="badge">${prizeValue} جنيه</span>`
            : "الافتراضية (غير محددة)";
        } catch (e) {
          notify("خطأ: " + e.message, "error");
        }
      };

      document.getElementById("btn-save-prize").onclick = async () => {
        const level = prizesLevelSelect.value;
        const value = parseInt(prizeInput.value);
        if (isNaN(value) || value < 0) {
          notify("❌ أدخلي قيمة صحيحة (رقم موجب)", "error");
          return;
        }
        try {
          await set(ref(db, `prizes/${level}`), value);
          notify(`✅ تم حفظ ${value} جنيه للمستوى ${level}!`);
          document.getElementById("btn-fetch-prizes").click();
        } catch (e) {
          notify("خطأ: " + e.message, "error");
        }
      };

      document.getElementById("btn-reset-prize").onclick = async () => {
        const level = prizesLevelSelect.value;
        try {
          await remove(ref(db, `prizes/${level}`));
          notify(`✅ تم إعادة المستوى ${level} للقيمة الافتراضية`);
          prizeInput.value = "";
          document.getElementById("btn-fetch-prizes").click();
        } catch (e) {
          notify("خطأ: " + e.message, "error");
        }
      };

      // --- 1. جلب الأسئلة ---
      document.getElementById("btn-fetch").onclick = async () => {
        const level = levelSelect.value;
        statusBox.innerHTML = "جاري التحميل...";
        try {
          const snap = await get(ref(db, `questions/${level}`));
          if (snap.exists()) {
            const raw = snap.val();
            const readable = Object.keys(raw).map((id) => ({
              id: id,
              q: raw[id].q,
              options: raw[id].options.map((o) => o),
              answer: raw[id].answer,
              tip: raw[id].tip || "",
            }));
            editor.value = JSON.stringify(readable, null, 4);
            statusBox.innerHTML = `تم العثور على <span class="badge">${readable.length}</span> سؤال.`;
          } else {
            editor.value = "[]";
            statusBox.innerHTML = "المستوى فارغ حالياً.";
          }
        } catch (e) {
          notify("خطأ: " + e.message, "error");
        }
      };

// --- 2. حفظ التعديلات اليدوية (plaintext only) ---
      document.getElementById("btn-save-edit").onclick = async () => {
        const level = levelSelect.value;
        try {
          const edited = JSON.parse(editor.value);
          if (!Array.isArray(edited)) throw new Error('يجب أن تكون مصفوفة JSON: [{"question":"...", "options":[...], "answer":"...", "explanation":"..."}]');
          
          const finalData = {};
          edited.forEach((item, idx) => {
            if (!item.question || !Array.isArray(item.options) || !item.answer || !item.explanation) {
              throw new Error(`سؤال ${idx+1}: مطلوب question, options[], answer(نص مطابق لخيار), explanation`);
            }
            const qText = item.question.trim();
            const opts = item.options.map(o => String(o).trim()).filter(Boolean);
            if (opts.length < 2) throw new Error(`سؤال ${idx+1}: options يجب ≥2 خيارات`);
            const ansStr = String(item.answer).trim();
            const ansIndex = opts.findIndex(opt => opt === ansStr);
            if (ansIndex === -1) throw new Error(`سؤال ${idx+1}: answer "${ansStr}" غير موجود في options: ${opts.join(', ')}`);
            const tip = item.explanation.trim();

            const key = item.id || push(ref(db, `questions/${level}`)).key;
            finalData[key] = {
              q: qText,
              options: opts,
              answer: ansIndex,
              tip: tip
            };
          });
          await set(ref(db, `questions/${level}`), finalData);
          notify(`✅ تم حفظ ${edited.length} سؤال في المستوى ${level}!`);
          statusBox.innerHTML = `✅ ${edited.length} سؤال محفوظ`;
        } catch (e) {
          notify("❌ " + e.message, "error");
        }
      };




/* TODO: Bulk import feature can be added here later */



      // --- 4. مسح المستوى 🗑️ (محدث 100%)
      document.getElementById("btn-clear-level").onclick = async () => {
        const level = levelSelect.value;
        console.log('🗑️ مسح المستوى:', level);
        
        if (!level) {
          notify("❌ اختر مستوى أولاً من القائمة!", "error");
          statusBox.innerHTML = "❌ يجب اختيار مستوى أولاً";
          return;
        }
        
        if (confirm(`🗑️ سيتم مسح كل أسئلة المستوى ${level} نهائياً. متأكدة؟`)) {
          try {
            statusBox.innerHTML = `جاري مسح المستوى ${level}...`;
            await remove(ref(db, `questions/${level}`));
            notify(`✅ تم مسح المستوى ${level} بنجاح! 🎉`);
            editor.value = "[]";
            statusBox.innerHTML = `✅ تم مسح ${level} - فارغ الآن (${new Date().toLocaleTimeString('ar')})`;
          } catch (error) {
            console.error('❌ خطأ Firebase:', error);
            notify(`❌ خطأ في المسح: ${error.message}`, "error");
            statusBox.innerHTML = `❌ فشل مسح ${level}: ${error.message}`;
          }
        }
      };
    </script>
  </body>
</html>
