<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>اختبار المستوى - جروب المشتركين</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Reset and base */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Cairo", sans-serif;
        user-select: none;
      }
      body,
      html {
        height: 100%;
        background: linear-gradient(
          -45deg,
          #a7d129,
          #78b159,
          #ff6b6b,
          #4ecdc4,
          #45b7d1,
          #f9ca24
        );
        background-size: 400% 400%;
        animation: bgAnimate 15s ease infinite;
        color: #fff;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      @keyframes bgAnimate {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      @keyframes glow {
        from {
          text-shadow: 0 0 8px #4caf50;
        }
        to {
          text-shadow: 0 0 20px #4caf50, 0 0 30px #4caf50;
        }
      }
      @keyframes flyUp {
        0% {
          transform: translateY(0);
          opacity: 1;
        }
        100% {
          transform: translateY(-300px) translateX(150px);
          opacity: 0;
        }
      }
      #game-container {
        width: 100%;
        max-width: 480px;
        background: rgba(0, 0, 0, 0.8);
        border-radius: 30px;
        box-shadow: 0 0 30px #4caf50, 0 0 40px #78b159;
        padding: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        border: 2px solid #78b159;
      }
      h1 {
        font-size: 28px;
        margin-bottom: 10px;
        text-shadow: 0 0 8px #4caf50;
        animation: glow 2s ease-in-out infinite alternate;
      }
      /* Login */
      #login-screen {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
      }
      #login-screen input {
        width: 90%;
        padding: 12px 15px;
        border-radius: 15px;
        border: none;
        font-size: 16px;
        font-weight: 700;
        outline: none;
      }
      #login-screen button {
        width: 90%;
        padding: 12px 0;
        border-radius: 30px;
        border: none;
        background: #4caf50;
        font-weight: 700;
        font-size: 18px;
        cursor: pointer;
        box-shadow: 0 0 15px #66bb6a;
        transition: background 0.3s ease;
      }
      #login-screen button:hover {
        background: #66bb6a;
      }
      /* Game HUD */
      #hud {
        width: 100%;
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        font-weight: 700;
        font-size: 18px;
        text-shadow: 0 0 6px #000;
      }
      #coins {
        color: gold;
      }
      #level-indicator {
        color: #a5d6a7;
      }
      /* Levels screen */
      #levels-screen {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .level-btn {
        background: #81c784;
        border-radius: 20px;
        padding: 15px;
        font-weight: 700;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 0 0 15px #4caf50;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: background 0.3s ease;
      }
      .level-btn.locked {
        background: #cfd8dc;
        color: #78909c;
        cursor: not-allowed;
        box-shadow: none;
      }
      .level-btn:hover:not(.locked) {
        background: #4caf50;
      }
      /* Question screen */
      #question-screen {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
      #progress-bar {
        width: 100%;
        height: 10px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        overflow: hidden;
        margin-bottom: 10px;
      }
      #progress-fill {
        height: 100%;
        background: #4caf50;
        width: 0%;
        transition: width 0.3s ease;
      }
      #question-text {
        font-size: 22px;
        font-weight: 700;
        text-shadow: 0 0 6px #000;
      }
      .answer-btn {
        background: #4caf50;
        border-radius: 30px;
        padding: 12px 0;
        font-weight: 700;
        font-size: 18px;
        cursor: pointer;
        box-shadow: 0 0 15px #388e3c;
        transition: background 0.3s ease;
        margin: 6px 10px;
        color: #fff;
        border: none;
      }
      .answer-btn:hover:not(:disabled) {
        background: #66bb6a;
      }
      .answer-btn:disabled {
        background: #a5d6a7;
        cursor: not-allowed;
        color: #555;
        box-shadow: none;
      }
      /* Toast */
      #toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #4caf50;
        padding: 14px 24px;
        border-radius: 30px;
        box-shadow: 0 0 20px #4caf50;
        font-weight: 700;
        font-size: 16px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 10000;
      }
      #toast.show {
        opacity: 1;
        pointer-events: auto;
      }
      /* Duo mascot */
      #duo-mascot {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 120px;
        user-select: none;
        pointer-events: none;
        z-index: 1100;
        text-align: center;
        font-family: var(--font-family);
        filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.5));
        animation: float 3s ease-in-out infinite;
      }
      #duo-message {
        margin-top: 8px;
        background: #4caf50;
        color: #fff;
        padding: 8px 12px;
        border-radius: 20px;
        font-weight: 700;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.3s ease, transform 0.3s ease;
        user-select: none;
        transform-origin: bottom center;
        position: absolute;
        bottom: 140px;
        left: 50%;
        transform: translateX(-50%) translateY(0);
        white-space: nowrap;
      }
      #duo-message.show {
        opacity: 1 !important;
        transform: translateX(-50%) translateY(-10px);
      }
      /* Animations */
      @keyframes confetti-fall {
        0% {
          transform: translateX(0) translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateX(calc(-50vw + 50%)) translateY(100vh)
            rotate(720deg);
          opacity: 0;
        }
      }
      .confetti {
        position: fixed;
        top: 0;
        left: 50%;
        width: 10px;
        height: 10px;
        background: gold;
        box-shadow: 0 0 10px gold;
        animation: confetti-fall 1.5s ease forwards;
        pointer-events: none;
        z-index: 2000;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20%,
        60% {
          transform: translateX(-10px);
        }
        40%,
        80% {
          transform: translateX(10px);
        }
      }
      .shake {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        animation: shake 0.6s ease;
        border: 3px solid red;
        border-radius: 20px;
        box-sizing: border-box;
        z-index: 1500;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <h1>لعبة اختبار المستوى</h1>
      <div id="login-screen">
        <input
          id="username"
          placeholder="اسم المستخدم (حروف صغيرة فقط)"
          autocomplete="username"
        />
        <input
          id="password"
          type="password"
          placeholder="كلمة المرور"
          autocomplete="current-password"
        />
        <button id="login-btn">دخول / تسجيل</button>
      </div>
      <div id="hud" style="display: none">
        <div id="level-indicator">المستوى: 1</div>
        <div id="coins">🪙 0</div>
        <button id="logout-btn" style="background: #e53935">خروج</button>
      </div>
      <div id="levels-screen" style="display: none"></div>
      <div id="question-screen" style="display: none">
        <div id="question-text"></div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="answers"></div>
        <button
          id="back-to-levels-btn"
          style="margin-top: 15px; background: #e53935"
        >
          عودة للمستويات
        </button>
      </div>
    </div>
    <div id="duo-mascot">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Duolingo_owl.svg"
        alt="Duo Mascot"
        width="120"
      />
      <div id="duo-message"></div>
    </div>
    <div id="toast"></div>

    <audio
      id="correct-sound"
      src="https://www.soundjay.com/button/sounds/button-4.mp3"
      preload="auto"
    ></audio>
    <audio
      id="wrong-sound"
      src="https://www.soundjay.com/button/sounds/button-10.mp3"
      preload="auto"
    ></audio>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        get,
        set,
        update,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDrPR-5-IaSD7-ij1oj3Y4M9ARQBMK66eo",
        authDomain: "levels-409ba.firebaseapp.com",
        databaseURL: "https://levels-409ba-default-rtdb.firebaseio.com/",
        projectId: "levels-409ba",
        storageBucket: "levels-409ba.appspot.com",
        messagingSenderId: "54945336454",
        appId: "1:54945336454:web:51e6f513c1d2a91e23d507",
      };
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      let currentUser = null;
      let currentLevel = 1;
      let currentQuestionIndex = 0;
      let currentQuestions = [];
      let answering = false;
      let userCoins = 0;
      let userProgress = { 1: false, 2: false, 3: false };

      const levelsData = {
        1: { questions: 5, passRate: 0.7 },
        2: { questions: 5, passRate: 0.8 },
        3: { questions: 5, passRate: 0.9 },
      };
      const questionsData = {
        1: [
          {
            q: "ما هو لون السماء؟",
            options: ["أزرق", "أخضر", "أحمر", "أسود"],
            answer: 0,
          },
          {
            q: "كم عدد أيام الأسبوع؟",
            options: ["5", "6", "7", "8"],
            answer: 2,
          },
          {
            q: "ما هو الكوكب الأقرب للشمس؟",
            options: ["الزهرة", "الأرض", "عطارد", "المريخ"],
            answer: 2,
          },
          {
            q: "أين توجد الأهرامات؟",
            options: ["مصر", "اليونان", "اليابان", "أمريكا"],
            answer: 0,
          },
          { q: "كم عدد أصابع اليد؟", options: ["4", "5", "6", "7"], answer: 1 },
        ],
        2: [
          {
            q: "ما هو أكبر محيط؟",
            options: ["الهادي", "الأطلسي", "الهندي", "المتجمد"],
            answer: 0,
          },
          {
            q: "أين تقع باريس؟",
            options: ["ألمانيا", "فرنسا", "إيطاليا", "إسبانيا"],
            answer: 1,
          },
          {
            q: "ما هو رمز الماء الكيميائي؟",
            options: ["H2O", "CO2", "O2", "NaCl"],
            answer: 0,
          },
          {
            q: "من هو مؤسس فيسبوك؟",
            options: ["إيلون ماسك", "مارك زوكربيرغ", "بيل غيتس", "ستيف جوبز"],
            answer: 1,
          },
          {
            q: "ما هو الحيوان الأسرع؟",
            options: ["السلحفاة", "الفهد", "الأسد", "الحصان"],
            answer: 1,
          },
        ],
        3: [
          {
            q: "ما هو أطول نهر في العالم؟",
            options: ["النيل", "الأمازون", "الدانوب", "الغانج"],
            answer: 0,
          },
          {
            q: "ما هي عاصمة اليابان؟",
            options: ["أوساكا", "طوكيو", "كيوتو", "ناغويا"],
            answer: 1,
          },
          {
            q: "كم عدد الكواكب في المجموعة الشمسية؟",
            options: ["7", "8", "9", "10"],
            answer: 1,
          },
          {
            q: "ما هو أسرع حيوان بري؟",
            options: ["الأسد", "الفهد", "الظباء", "الذئب"],
            answer: 1,
          },
          {
            q: "ما هو الغاز الرئيسي في الهواء؟",
            options: [
              "الأكسجين",
              "النيتروجين",
              "الهيدروجين",
              "ثاني أكسيد الكربون",
            ],
            answer: 1,
          },
        ],
      };

      const loginScreen = document.getElementById("login-screen");
      const loginBtn = document.getElementById("login-btn");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const hud = document.getElementById("hud");
      const coinsDisplay = document.getElementById("coins");
      const levelIndicator = document.getElementById("level-indicator");
      const logoutBtn = document.getElementById("logout-btn");
      const levelsScreen = document.getElementById("levels-screen");
      const questionScreen = document.getElementById("question-screen");
      const questionText = document.getElementById("question-text");
      const answersDiv = document.getElementById("answers");
      const backToLevelsBtn = document.getElementById("back-to-levels-btn");
      const duoMessageEl = document.getElementById("duo-message");
      const toast = document.getElementById("toast");
      const correctSound = document.getElementById("correct-sound");
      const wrongSound = document.getElementById("wrong-sound");

      function showToast(message, duration = 2000) {
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), duration);
      }

      function showDuoMessage(text, duration = 2000) {
        duoMessageEl.textContent = text;
        duoMessageEl.classList.add("show");
        setTimeout(() => duoMessageEl.classList.remove("show"), duration);
      }

      loginBtn.addEventListener("click", async () => {
        let name = usernameInput.value
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "-");
        let pass = passwordInput.value.trim();
        if (!name || !pass) {
          showToast("اكتب اسم المستخدم وكلمة المرور");
          return;
        }
        try {
          const userRef = ref(db, `users/${name}`);
          const snap = await get(userRef);
          if (snap.exists()) {
            const data = snap.val();
            if (data.password !== pass) {
              showToast("كلمة المرور خاطئة");
              return;
            }
            currentUser = name;
            userCoins = data.coins || 0;
            userProgress = data.progress || { 1: false, 2: false, 3: false };
            updateHUD();
            showToast(`أهلًا ${name}`);
          } else {
            await set(userRef, {
              password: pass,
              createdAt: Date.now(),
              progress: { 1: false, 2: false, 3: false },
              answers: {},
              coins: 0,
            });
            currentUser = name;
            userCoins = 0;
            userProgress = { 1: false, 2: false, 3: false };
            updateHUD();
            showToast("تم إنشاء الحساب وتسجيل الدخول");
          }
          loginScreen.style.display = "none";
          hud.style.display = "flex";
          renderLevels();
        } catch (e) {
          console.error(e);
          showToast("خطأ في الاتصال بقاعدة البيانات");
        }
      });

      logoutBtn.addEventListener("click", () => {
        currentUser = null;
        userCoins = 0;
        loginScreen.style.display = "flex";
        hud.style.display = "none";
        levelsScreen.style.display = "none";
        questionScreen.style.display = "none";
        usernameInput.value = "";
        passwordInput.value = "";
      });

      function updateHUD() {
        coinsDisplay.textContent = `ج.م ${userCoins}`;
        levelIndicator.textContent = `المستوى: ${currentLevel}`;
      }

      function renderLevels() {
        levelsScreen.innerHTML = "";
        levelsScreen.style.display = "flex";
        questionScreen.style.display = "none";
        for (let i = 1; i <= 3; i++) {
          const btn = document.createElement("button");
          btn.className = "level-btn";
          const isUnlocked = i === 1 || userProgress[i - 1];
          btn.disabled = !isUnlocked;
          if (!isUnlocked) {
            btn.classList.add("locked");
            btn.innerHTML = `🔒 المستوى ${i}`;
          } else {
            btn.innerHTML = `🎯 المستوى ${i}`;
          }
          btn.addEventListener("click", () => startLevel(i));
          levelsScreen.appendChild(btn);
        }
      }

      function startLevel(level) {
        currentLevel = level;
        currentQuestionIndex = 0;
        currentQuestions = questionsData[level];
        updateHUD();
        levelsScreen.style.display = "none";
        questionScreen.style.display = "flex";
        showQuestion();
      }

      function showQuestion() {
        const q = currentQuestions[currentQuestionIndex];
        questionText.textContent = q.q;
        const progress =
          ((currentQuestionIndex + 1) / currentQuestions.length) * 100;
        document.getElementById("progress-fill").style.width = progress + "%";
        answersDiv.innerHTML = "";
        answering = false;
        q.options.forEach((opt, idx) => {
          const btn = document.createElement("button");
          btn.className = "answer-btn";
          btn.textContent = opt;
          btn.disabled = false;
          btn.addEventListener("click", () => answerQuestion(idx, btn));
          answersDiv.appendChild(btn);
        });
      }

      async function answerQuestion(selected, btn) {
        if (answering) return;
        answering = true;
        Array.from(answersDiv.children).forEach((b) => (b.disabled = true));
        const q = currentQuestions[currentQuestionIndex];
        const isCorrect = selected === q.answer;
        try {
          if (isCorrect) {
            await correctSound.play();
            showDuoMessage("رائع! 🎉");
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 1500);
          } else {
            await wrongSound.play();
            showDuoMessage("حاول مرة أخرى، أنت قادر! 🤔");
            const shake = document.createElement("div");
            shake.className = "shake";
            questionScreen.appendChild(shake);
            setTimeout(() => shake.remove(), 600);
          }
        } catch (e) {}
        try {
          await set(
            ref(
              db,
              `users/${currentUser}/answers/${currentLevel}/${
                currentQuestionIndex + 1
              }`
            ),
            isCorrect
          );
        } catch (e) {
          console.error(e);
          showToast("فشل حفظ الإجابة");
        }
        currentQuestionIndex++;
        setTimeout(async () => {
          if (currentQuestionIndex >= currentQuestions.length) {
            await checkLevelCompletion();
          } else {
            showQuestion();
          }
          answering = false;
        }, 500);
      }

      backToLevelsBtn.addEventListener("click", () => {
        renderLevels();
        questionScreen.style.display = "none";
      });

      async function checkLevelCompletion() {
        try {
          const progressSnap = await get(
            ref(db, `users/${currentUser}/progress`)
          );
          const progress = progressSnap.val() || {
            1: false,
            2: false,
            3: false,
          };
          const snap = await get(
            ref(db, `users/${currentUser}/answers/${currentLevel}`)
          );
          const answers = snap.val() || {};
          const total = Object.keys(answers).length;
          const correct = Object.values(answers).filter(Boolean).length;
          const required = Math.ceil(levelsData[currentLevel].passRate * total);
          if (correct >= required) {
            if (!progress[currentLevel]) {
              addCoins(5);
            }
            await update(ref(db, `users/${currentUser}/progress`), {
              [currentLevel]: true,
            });
            userProgress[currentLevel] = true;
            showToast(`تم الاجتياز! صح ${correct} من ${total}`);
            showDuoMessage("ممتاز! أنت تتقدم بسرعة! 🚀", 3000);
          } else {
            showToast(`لم تُجتز. صح ${correct}/${total} — مطلوب ${required}`);
            showDuoMessage("لا تيأس، حاول مرة أخرى! 💪", 3000);
          }
          renderLevels();
          questionScreen.style.display = "none";
        } catch (e) {
          console.error(e);
          showToast("فشل التحقق من النتيجة");
        }
      }

      function addCoins(amount) {
        userCoins += amount;
        updateHUD();
        if (currentUser) {
          const userRef = ref(db, `users/${currentUser}`);
          update(userRef, { coins: userCoins });
        }
        for (let i = 0; i < amount; i++) {
          setTimeout(() => {
            const coinEl = document.createElement("div");
            coinEl.textContent = "ج.م";
            coinEl.style.position = "fixed";
            coinEl.style.left = 50 + Math.random() * 20 - 10 + "%";
            coinEl.style.bottom = "50px";
            coinEl.style.fontSize = "30px";
            coinEl.style.color = "gold";
            coinEl.style.zIndex = "2000";
            coinEl.style.animation = "flyUp 1s ease-out forwards";
            document.body.appendChild(coinEl);
            setTimeout(() => coinEl.remove(), 1000);
          }, i * 100);
        }
      }
    </script>
  </body>
</html>
