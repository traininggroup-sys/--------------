    <meta name="viewport" content="width=device-width,initial-scale=1" />

    />
    <style>
      :root {
        --bg: #0f1419;
        --card: #1a1d23;
        --accent: #7dd3fc;
        --accent-secondary: #a7f3d0;
        --accent-tertiary: #f9a8d4;
        --muted: #0509f0;
        --glass: rgba(255, 255, 255, 0.05);
      }
      * {
        box-sizing: border-box;
        font-family: "Cairo", sans-serif;
      }
      body {
        margin: 0;
        padding: 20px;
        background: linear-gradient(180deg, #e0e7ff 0%, #c7d2fe 100%);
        color: #1e1b4b;
        min-height: 100vh;
        font-weight: 900;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
      }
      .top-controls {
        display: flex;
        gap: 8px;
        align-items: stretch;
        flex-wrap: nowrap;
        flex-direction: column;
        justify-content: center;
      }
      .coin-container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }
      .coin-float {
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-weight: bold;
        font-size: 14px;
        display: none;
      }
      .coin-float.show {
        display: block;
        animation: floatUp 1s ease-out forwards;
      }
      @keyframes floatUp {
        0% {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateX(-50%) translateY(-30px);
        }
      }
      button {
        cursor: pointer;
      }

      /* Existing UI (login/levels/question/leaderboard/toast) - kept mostly same */
      #login-section {
        background: var(--card);
        padding: 18px;
        border-radius: 12px;
        background: #d8cadf;
      }
      .input-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        background: #d8cadf;
      }
      input[type="text"],
      input[type="password"] {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: white;
        width: 200px;
      }
      #login-btn {
        padding: 10px 14px;
        background: #897a93;
        border: none;
        color: #ffffff;
        font-weight: 700;
        border-radius: 8px;
      }

      #levels {
        display: none;
        margin-top: 16px;
        gap: 10px;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .level-card {
        min-width: 315px;
        padding: 14px;
        /* border-radius: 12px; */
        text-align: center;
        font-weight: 700;
        cursor: pointer;
        background: var(--glass);
        border: 1px solid rgba(255, 255, 255, 0.03);
        transition: transform 0.15s, box-shadow 0.15s;
        display: flex;
        gap: 44px;
        align-content: center;
        justify-content: center;
        font-size: 20px;
      }
      .level-card.open {
        background: #45ff8c;
        color: #022;
      }
      .level-card.passed {
        background: #aae06c;
        color: #022;
      }
      .level-card.locked {
        background: #486d88;
        color: rgb(255 255 255);
        cursor: not-allowed;
      }

      #question-box {
        display: none;
        background: #b2caf9;
        padding: 18px;
        border-radius: 12px;
        margin-top: 16px;
      }
      #question-info {
        font-size: 16px;
        margin-bottom: 12px;
        color: #1e1b4b;
      }
      #question-text {
        font-size: 18px;
        margin-bottom: 12px;
      }
      #answers {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #tip {
        margin-top: 10px;
        font-size: 14px;
        color: #1e1b4b;
      }
      #answers label {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        cursor: pointer;
      }
      #answers input[type="radio"] {
        margin: 0;
      }
      #next-button {
        margin-top: 16px;
        padding: 10px 14px;
        background: #897a93;
        border: none;
        color: #ffffff;
        font-weight: 700;
        border-radius: 8px;
        cursor: pointer;
      }

      #result {
        display: none;
        background: #b2caf9;
        padding: 18px;
        border-radius: 12px;
        margin-top: 16px;
      }
      #score {
        font-size: 18px;
        margin-bottom: 12px;
      }
      #review {
        margin-bottom: 16px;
      }
      .review-item {
        margin-bottom: 8px;
        padding: 8px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
      }
      .review-item.correct {
        background: #d4edda;
      }
      .review-item.incorrect {
        background: #f8d7da;
      }

      #leaderboard {
        display: none;
        position: fixed;
        inset: 10% 10%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
        border-radius: 16px;
        z-index: 60;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        max-height: 70vh;
        overflow: auto;
        border: 2px solid rgba(255, 255, 255, 0.1);
      }
      #leaderboard h2 {
        color: white;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        margin: 0;
        font-size: 24px;
      }
      .leader-user {
        padding: 12px 16px;
        border-radius: 12px;
        margin-bottom: 10px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: transform 0.2s, box-shadow 0.2s;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .leader-user:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }
      .leader-user.first-place {
        background: linear-gradient(135deg, #ffd700, #ffed4e);
        color: #333;
        border: 2px solid #ffd700;
      }
      .leader-user.second-place {
        background: linear-gradient(135deg, #c0c0c0, #e5e5e5);
        color: #333;
        border: 2px solid #c0c0c0;
      }
      .leader-user.third-place {
        background: linear-gradient(135deg, #cd7f32, #d4a574);
        color: #333;
        border: 2px solid #cd7f32;
      }
      .leader-user .rank {
        font-size: 20px;
        font-weight: bold;
        margin-right: 10px;
        min-width: 30px;
        text-align: center;
      }
      .leader-user .user-info {
        flex: 1;
      }
      .leader-user .user-name {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 4px;
      }
      .leader-user .user-stats {
        font-size: 14px;
        opacity: 0.9;
      }
      .level-chip {
        background: rgba(255, 255, 255, 0.2);
        padding: 4px 8px;
        border-radius: 8px;
        font-size: 12px;
        margin: 2px;
        display: inline-block;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .levels {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .back-btn {
        background: #946b9d;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 8px;
        margin-top: 10px;
      }

      .toast {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 20px;
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        z-index: 80;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .toast.show {
        opacity: 1;
      }
      .toast.ok {
        background: linear-gradient(90deg, #10b981, #059669);
      }
      .toast.warn {
        background: linear-gradient(90deg, #f59e0b, #d97706);
      }
      .toast.err {
        background: linear-gradient(90deg, #ef4444, #dc2626);
      }

      .footer-note {
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 640px) {
        header {
          flex-direction: column;
          align-items: center;
        }
      }
      img#egypounds {
        width: 57px;
        /* margin-top: 6px; */
      }
      strong {
        font-size: 27px;
      }
    </style>
  </head>

      // ----------------- UI و إجراءات المستخدم -----------------
      document
        .getElementById("login-btn")
        .addEventListener("click", async () => {
          const username = document
            .getElementById("username")
            .value.trim()
            .toLowerCase();
          const password = document.getElementById("password").value.trim();
          if (!username || !password) {
            showToast("تنبيه", "يرجى إدخال اسم المستخدم وكلمة المرور", "warn");
            return;
          }
          // تعطيل الزر وتغيير النص إلى "جاري التحميل..."
          loginBtn.disabled = true;
          loginBtn.textContent = "جاري التحميل...";
          try {
            const userRef = ref(db, "users/" + username);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
              const data = snapshot.val();
              if (data.password === password) {
                currentUser = {
                  username,
                  passedLevels: data.passedLevels || [],
                  coins: data.coins || 0,
                };
                userCoins = data.coins || 0;
                coinCountEl.textContent = userCoins;
                showToast("🎉", "تم تسجيل الدخول بنجاح", "ok");
                showLevels();
              } else {
                showToast("خطأ", "كلمة المرور غير صحيحة", "err");
              }
            } else {
              await set(userRef, { password, passedLevels: [], coins: 0 });
              currentUser = { username, passedLevels: [], coins: 0 };
              userCoins = 0;
              coinCountEl.textContent = 0;
              showToast("✅", "تم إنشاء الحساب", "ok");
              showLevels();
            }
          } catch (e) {
            console.error(e);
            showToast("خطأ", "حدث خطأ أثناء الاتصال بقاعدة البيانات", "err");
          } finally {
            // إعادة تفعيل الزر واستعادة النص الأصلي
            loginBtn.disabled = false;
            loginBtn.textContent = "دخول / إنشاء حساب";
          }
        });

      function showLevels() {
        if (!currentUser) return;
        loginSection.style.display = "none";
        levelsDiv.style.display = "flex";
        logoutBtn.style.display = "inline-block";
        leaderboardBtn.style.display = "inline-block";
        levelsDiv.innerHTML = "";
        const passed = currentUser.passedLevels || [];
        const highest = passed.length ? Math.max(...passed) : 0;
        Object.keys(levelsData).forEach((lvlStr) => {
          const lvl = +lvlStr;
          const card = document.createElement("div");
          card.className = "level-card";
          const price = lvl; // سعر المستوى
          const status = passed.includes(lvl)
            ? "تم الإنجاز"
            : lvl === highest + 1
            ? "متاح"
            : "مقفول";
          card.innerHTML = `
            <div>المستوى ${lvl}</div>
            <div style="font-size: 16px; margin-top: 2px; color: var(--muted);">${status}</div>
          `;
          card.addEventListener("click", async () => {
            if (passed.includes(lvl)) {
              startLevel(lvl);
            } else if (lvl === highest + 1) {
              startLevel(lvl);
            } else {
              // محاولة الشراء
              if (userCoins >= price) {
                userCoins -= price;
                coinCountEl.textContent = userCoins;
                currentUser.passedLevels.push(lvl);
                currentUser.coins = userCoins;
                try {
                  await update(ref(db, "users/" + currentUser.username), {
                    passedLevels: currentUser.passedLevels,
                    coins: userCoins,
                  });
                  showToast("✅", `تم شراء المستوى ${lvl}`, "ok");
                  showLevels();
                } catch (e) {
                  console.error(e);
                  showToast("خطأ", "حدث خطأ أثناء الشراء", "err");
                  // استرجاع العملات لو فشل
                  userCoins += price;
                  coinCountEl.textContent = userCoins;
                  currentUser.passedLevels.pop();
                }
              } else {
                showToast("❌", "لسه منجحتش في المستوي السابق", "err");
              }
            }
          });
          if (passed.includes(lvl)) {
            card.classList.add("passed");
          } else if (lvl === highest + 1) {
            card.classList.add("open");
          } else {
            card.classList.add("locked");
          }
          levelsDiv.appendChild(card);
        });
      }

      function startLevel(level) {
        currentLevel = level;
        currentQuestions = structuredClone(questionsData[level] || []);
        currentQuestionIndex = 0;
        correctAnswers = 0;
        userAnswers = []; // Reset user answers
        tipEl.style.display = "none";
        // تحقق كلمة مرور للمستويات المحمية
        if (levelsData[level] && levelsData[level].password) {
          const password = prompt(`أدخل كلمة المرور للمستوى ${level}:`);
          if (password !== levelsData[level].password) {
            showToast("خطأ", "كلمة المرور غير صحيحة", "warn");
            showLevels();
            return;
          }
        }
        // أظهر واجهة الأسئلة
        levelsDiv.style.display = "none";
        questionBox.style.display = "block";
        renderQuestion();
      }

      // --- عرض سؤال ---
      function renderQuestion() {
        const q = currentQuestions[currentQuestionIndex];
        if (!q) {
          // آمن: لو ما فيه سؤال (مثلاً خطأ) => أنهِ المستوى
          endLevel();
          return;
        }
        document.getElementById("question-text").textContent = q.q;
        answersDiv.innerHTML = "";
        tipEl.style.display = "none";
        q.options.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.textContent = opt;
          btn.addEventListener("click", () => checkAnswer(i));
          answersDiv.appendChild(btn);
        });
      }

      function checkAnswer(i) {
        if (answering) return;
        answering = true;
        const q = currentQuestions[currentQuestionIndex];
        const buttons = answersDiv.querySelectorAll("button");
        buttons.forEach((b) => (b.disabled = true));

        // Track user answer
        userAnswers.push({
          questionIndex: currentQuestionIndex,
          userChoice: i,
          correct: i === q.answer,
        });

        if (i === q.answer) {
          correctAnswers++;
          showToast("✅", "إجابة صحيحة", "ok");
        } else {
          try {
            wrongSound.play();
          } catch (e) {}
          // فكرة 3: إظهار التلميح/الإجابة الصحيحة داخل الواجهة (بدون الخروج)
          tipEl.style.display = "block";
          tipEl.textContent = `💡 الإجابة الصحيحة: ${q.options[q.answer]} — ${
            q.tip || ""
          }`;
          showToast("❌", "إجابة خاطئة —  ذاكري تاني", "err");
        }

        // انتقل للسؤال التالي مع تحديث الخريطة
        setTimeout(() => {
          answering = false;
          currentQuestionIndex++;
          if (currentQuestionIndex < currentQuestions.length) {
            renderQuestion();
          } else {
            endLevel();
          }
        }, 900);
      }

      async function endLevel() {
        questionBox.style.display = "none";
        levelsDiv.style.display = "flex";

        const passRate = correctAnswers / (currentQuestions.length || 1);
        if (passRate >= levelsData[currentLevel].passRate) {
          if (!currentUser.passedLevels.includes(currentLevel)) {
            currentUser.passedLevels.push(currentLevel);
            userCoins += currentLevel;
            coinCountEl.textContent = userCoins;
            // Floating coin animation
            const coinFloat = document.getElementById("coin-float");
            coinFloat.textContent = "+" + currentLevel;
            coinFloat.classList.add("show");
            setTimeout(() => {
              coinFloat.classList.remove("show");
            }, 1000);
            try {
              correctSound.play();
            } catch (e) {}
          }
          currentUser.coins = userCoins;
          try {
            await update(ref(db, "users/" + currentUser.username), {
              passedLevels: currentUser.passedLevels,
              coins: userCoins,
            });
            showToast("👏", "أحسنت! أنهيت المستوى " + currentLevel, "ok");
          } catch (e) {
            console.error(e);
            showToast("خطأ", "حدث خطأ أثناء حفظ النتائج", "err");
          }
          showLevels();
        } else {
          showToast(
            "خطأ",
            "لم تحقق النسبة المطلوبة (" +
              Math.round(levelsData[currentLevel].passRate * 100) +
              "%) حاول مرة أخرى",
            "warn"
          );
        }
      }

      // توست
      let toastTimer = null;
      function showToast(title, msg, type = "ok") {
        toastTitle.textContent = title;
        toastMsg.textContent = msg;
        toastEl.className =
          "toast show " +
          (type === "err" ? "err" : type === "warn" ? "warn" : "ok");
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2000);
      }

      // زر تسجيل خروج
      logoutBtn.addEventListener("click", async () => {
        console.log("logout clicked");
        if (currentUser) {
          try {
            await update(ref(db, "users/" + currentUser.username), {
              coins: userCoins,
            });
          } catch (e) {
            console.error(e);
          }
        }
        currentUser = null;
        userCoins = 0;
        coinCountEl.textContent = 0;
        loginSection.style.display = "block";
        levelsDiv.style.display = "none";
        questionBox.style.display = "none";
        resultSection.style.display = "none";
        leaderboardCard.style.display = "none";
        leaderboardCard.setAttribute("aria-hidden", "true");
        logoutBtn.style.display = "none";
        leaderboardBtn.style.display = "none";
        showToast("✅", "تم تسجيل الخروج", "ok");
      });

      // لوحة المتصدرين
      leaderboardBtn.addEventListener("click", async () => {
        leaderboardCard.style.display = "block";
        leaderboardCard.setAttribute("aria-hidden", "false");
        levelsDiv.style.display = "none";
        lbList.innerHTML = "جارٍ التحميل...";
        try {
          const snapshot = await get(ref(db, "users"));
          if (snapshot.exists()) {
            const users = Object.entries(snapshot.val()).map(([u, data]) => ({
              name: u,
              coins: data.coins || 0,
              levels: data.passedLevels || [],
            }));
            users.sort((a, b) =>
              b.levels.length !== a.levels.length
                ? b.levels.length - a.levels.length
                : b.coins - a.coins
            );
            lbList.innerHTML = "";
            users.forEach((user, idx) => {
              const div = document.createElement("div");
              div.className = "leader-user";
              if (idx === 0) div.classList.add("first-place");
              else if (idx === 1) div.classList.add("second-place");
              else if (idx === 2) div.classList.add("third-place");
              div.innerHTML = `
                <div class="rank">${idx + 1}</div>
                <div class="user-info">
                  <div class="user-name">${escapeHtml(user.name)}</div>
                  <div class="user-stats">المستويات: ${
                    user.levels.length
                  } • العملات: ${user.coins}</div>
                </div>
                <div class="levels">${user.levels
                  .map((l) => `<span class="level-chip">${l}</span>`)
                  .join("")}</div>
              `;
              lbList.appendChild(div);
            });
          } else lbList.innerHTML = "لا يوجد متصدرين بعد.";
        } catch (e) {
          console.error(e);
          lbList.innerHTML = "حدث خطأ أثناء جلب المتصدرين.";
        }
      });

      closeLeaderboardBtn.addEventListener("click", () => {
        leaderboardCard.style.display = "none";
        leaderboardCard.setAttribute("aria-hidden", "true");
        levelsDiv.style.display = "flex";
      });

      backLevelsBtn.addEventListener("click", () => {
        questionBox.style.display = "none";
        levelsDiv.style.display = "flex";
      });

      // أمان بسيط لمنع XSS في اسم المستخدم عند العرض
      function escapeHtml(unsafe) {
        return unsafe
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // init: nothing auto-logged in; ويمكن إضافة شاشة ترحيب لاحقاً
    </script>
