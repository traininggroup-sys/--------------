<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>اختبار المستوى - جروب المشتركين</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1724;
        --card: #0b1220;
        --accent: #06b6d4;
        --muted: #9aa6b2;
        --glass: rgba(255, 255, 255, 0.03);
      }
      * {
        box-sizing: border-box;
        font-family: "Cairo", sans-serif;
      }
      body {
        margin: 0;
        padding: 20px;
        background: linear-gradient(180deg, #041025 0%, #071428 100%);
        color: #e6eef6;
        min-height: 100vh;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
      }
      .top-controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      button {
        cursor: pointer;
      }

      /* Existing UI (login/levels/question/leaderboard/toast) - kept mostly same */
      #login-section {
        background: var(--card);
        padding: 18px;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(2, 6, 23, 0.6);
      }
      .input-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      input[type="text"],
      input[type="password"] {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: transparent;
        color: inherit;
        width: 200px;
      }
      #login-btn {
        padding: 10px 14px;
        background: var(--accent);
        border: none;
        color: #022;
        font-weight: 700;
        border-radius: 8px;
      }

      #levels {
        display: none;
        margin-top: 16px;
        gap: 10px;
        flex-wrap: wrap;
        display: flex;
      }
      .level-card {
        min-width: 120px;
        padding: 14px;
        border-radius: 12px;
        text-align: center;
        font-weight: 700;
        cursor: pointer;
        background: var(--glass);
        border: 1px solid rgba(255, 255, 255, 0.03);
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .level-card.open {
        background: linear-gradient(90deg, #0ea5a9, #06b6d4);
        color: #022;
      }
      .level-card.passed {
        background: linear-gradient(90deg, #2563eb, #60a5fa);
        color: white;
      }
      .level-card.locked {
        background: #223344;
        color: rgba(255, 255, 255, 0.5);
        cursor: not-allowed;
      }

      #question-box {
        display: none;
        background: var(--card);
        padding: 18px;
        border-radius: 12px;
        margin-top: 16px;
      }
      #question-text {
        font-size: 18px;
        margin-bottom: 12px;
      }
      #answers {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #answers button {
        padding: 10px;
        border-radius: 8px;
        border: none;
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
        text-align: right;
      }
      #progress-wrap {
        height: 10px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 999px;
        overflow: hidden;
        margin: 12px 0;
      }
      #progress {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #34d399, #06b6d4);
      }

      #tip {
        background: rgba(255, 255, 255, 0.03);
        padding: 8px;
        border-radius: 8px;
        margin-top: 8px;
        display: none;
        color: var(--muted);
      }

      #leaderboard {
        display: none;
        position: fixed;
        inset: 10% 10%;
        background: var(--card);
        padding: 18px;
        border-radius: 12px;
        z-index: 60;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.8);
        max-height: 70vh;
        overflow: auto;
      }
      .leader-user {
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 8px;
        background: rgba(255, 255, 255, 0.02);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .level-chip {
        background: rgba(255, 255, 255, 0.03);
        padding: 4px 6px;
        border-radius: 6px;
        font-size: 12px;
      }

      .back-btn {
        background: #111827;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 8px;
      }

      .toast {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 20px;
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        z-index: 80;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .toast.show {
        opacity: 1;
      }
      .toast.ok {
        background: linear-gradient(90deg, #10b981, #059669);
      }
      .toast.warn {
        background: linear-gradient(90deg, #f59e0b, #d97706);
      }
      .toast.err {
        background: linear-gradient(90deg, #ef4444, #dc2626);
      }

      .footer-note {
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
      }

      /* فكرة 3 - خريطة التقدم (progress map) */
      #levels-map-wrap {
        margin-top: 24px;
        display: flex;
        justify-content: center;
      }
      #progress-map {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .progress-step {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #333;
        color: #cfcfcf;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.25s;
        border: 2px solid rgba(255, 255, 255, 0.03);
      }
      .progress-step.completed {
        background: linear-gradient(90deg, #2563eb, #06b6d4);
        color: white;
        box-shadow: 0 6px 18px rgba(6, 182, 212, 0.12);
      }
      .progress-step.active {
        background: linear-gradient(90deg, #06b6d4, #4dd0e1);
        color: #022;
        transform: scale(1.08);
        box-shadow: 0 8px 22px rgba(6, 182, 212, 0.12);
      }
      .progress-connector {
        width: 40px;
        height: 6px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 4px;
      }

      @media (max-width: 640px) {
        header {
          flex-direction: column;
          gap: 10px;
          align-items: flex-start;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <h1>اختبار المستوى - جروب المشتركين</h1>
        <div class="top-controls">
          <div>🪙 العملات: <span id="coin-count">0</span></div>
          <button id="leaderboard-btn" style="display: none" class="back-btn">
            🏆 المتصدرين
          </button>
          <button id="logout-btn" style="display: none" class="back-btn">
            تسجيل خروج
          </button>
        </div>
      </header>

      <section id="login-section" class="show">
        <div
          style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap"
        >
          <div class="input-row">
            <input id="username" placeholder="اسم المستخدم" type="text" />
            <input id="password" placeholder="كلمة المرور" type="password" />
            <button id="login-btn">دخول / إنشاء حساب</button>
          </div>
        </div>
        <p class="footer-note">سيتم حفظ مستوياتك والعملات في Firebase.</p>
      </section>

      <section id="levels"></section>

      <!-- خريطة التقدم (فكرة 3) -->
      <div id="levels-map-wrap" style="display: none">
        <div id="progress-map"></div>
      </div>

      <section id="question-box">
        <div id="question-text">سؤال هنا</div>
        <div id="answers"></div>
        <div id="progress-wrap"><div id="progress"></div></div>
        <div id="tip"></div>
        <div style="margin-top: 10px">
          <button id="back-levels-btn" class="back-btn">
            ⬅️ رجوع للمستويات
          </button>
        </div>
      </section>

      <div id="leaderboard" aria-hidden="true">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
          "
        >
          <h2>لوحة المتصدرين</h2>
          <button id="close-leaderboard-btn" class="back-btn">⬅️ رجوع</button>
        </div>
        <div id="leaderboard-list">جارٍ التحميل...</div>
      </div>

      <div id="toast" class="toast">
        <strong id="toast-title"></strong
        ><span id="toast-msg" style="margin-inline-start: 8px"></span>
      </div>

      <audio id="correct-sound">
        <source
          src="data:audio/mpeg;base64,//uQZAAAAAAAAAAAAAAAAAAAA..."
          type="audio/mpeg"
        />
      </audio>
      <audio id="wrong-sound">
        <source
          src="data:audio/mpeg;base64,//uQZAAAAAAAAAAAAAAAAAAAA..."
          type="audio/mpeg"
        />
      </audio>
    </div>

    <!-- Firebase و كود التطبيق (سكربت واحد فقط) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        get,
        set,
        update,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

      // إعدادات Firebase (كما عندك)
      const firebaseConfig = {
        apiKey: "AIzaSyDrPR-5-IaSD7-ij1oj3Y4M9ARQBMK66eo",
        authDomain: "levels-409ba.firebaseapp.com",
        databaseURL: "https://levels-409ba-default-rtdb.firebaseio.com",
        projectId: "levels-409ba",
        storageBucket: "levels-409ba.firebasestorage.app",
        messagingSenderId: "54945336454",
        appId: "1:54945336454:web:51e6f513c1d2a91e23d507",
        measurementId: "G-ZWME5X472Z",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // DOM refs
      const loginSection = document.getElementById("login-section");
      const levelsDiv = document.getElementById("levels");
      const questionBox = document.getElementById("question-box");
      const answersDiv = document.getElementById("answers");
      const leaderboardCard = document.getElementById("leaderboard");
      const lbList = document.getElementById("leaderboard-list");
      const leaderboardBtn = document.getElementById("leaderboard-btn");
      const backLevelsBtn = document.getElementById("back-levels-btn");
      const logoutBtn = document.getElementById("logout-btn");
      const closeLeaderboardBtn = document.getElementById(
        "close-leaderboard-btn"
      );

      const toastEl = document.getElementById("toast"),
        toastTitle = document.getElementById("toast-title"),
        toastMsg = document.getElementById("toast-msg");

      const correctSound = document.getElementById("correct-sound");
      const wrongSound = document.getElementById("wrong-sound");
      const coinCountEl = document.getElementById("coin-count");
      const tipEl = document.getElementById("tip");
      const progressEl = document.getElementById("progress");

      // فكرة 3 elements
      const levelsMapWrap = document.getElementById("levels-map-wrap");
      const progressMap = document.getElementById("progress-map");

      // حالة التطبيق (تعريف وحيد، لا تكرار)
      let currentUser = null;
      let currentLevel = 1;
      let currentQuestionIndex = 0;
      let currentQuestions = [];
      let answering = false;
      let correctAnswers = 0;
      let userCoins = 0;

      const levelsData = {
        1: { questions: 5, passRate: 0.9 },
        2: { questions: 5, passRate: 0.9 },
        3: { questions: 5, passRate: 0.9 },
        4: { questions: 5, passRate: 0.9 },
        5: { questions: 5, passRate: 0.9 },
        6: { questions: 5, passRate: 0.9 },
        7: { questions: 5, passRate: 0.9 },
        8: { questions: 5, passRate: 0.9 },
        9: { questions: 5, passRate: 0.9 },
        10: { questions: 5, passRate: 0.9 },
        11: { questions: 5, passRate: 1.0 }, // مستوى خاص
      };

      // أسئلتك كما هي (قصّرت هنا بالاحتفاظ بنفس البيانات)
      const questionsData = {
        1: [
          {
            q: "ما هو لون السماء؟",
            options: ["أزرق", "أخضر", "أحمر", "أسود"],
            answer: 0,
            tip: "لون السماء في النهار أزرق",
          },
          {
            q: "كم عدد أيام الأسبوع؟",
            options: ["5", "6", "7", "8"],
            answer: 2,
            tip: "أيام الأسبوع 7",
          },
          {
            q: "أين توجد الأهرامات؟",
            options: ["مصر", "اليونان", "اليابان", "أمريكا"],
            answer: 0,
            tip: "في مصر",
          },
          {
            q: "كم عدد أصابع اليد؟",
            options: ["4", "5", "6", "7"],
            answer: 1,
            tip: "خمسة أصابع",
          },
          {
            q: "أقرب كوكب للشمس؟",
            options: ["الزهرة", "الأرض", "عطارد", "المريخ"],
            answer: 2,
            tip: "عطارد",
          },
        ],
        // ... (باقي المستويات كما في كودك الأصلي)
        2: [
          {
            q: "ما هو أكبر محيط؟",
            options: ["الهادي", "الأطلسي", "الهندي", "المتجمد"],
            answer: 0,
            tip: "الهادي",
          },
          {
            q: "أين تقع باريس؟",
            options: ["ألمانيا", "فرنسا", "إيطاليا", "إسبانيا"],
            answer: 1,
            tip: "فرنسا",
          },
          {
            q: "رمز الماء؟",
            options: ["H2O", "CO2", "O2", "NaCl"],
            answer: 0,
            tip: "H2O",
          },
          {
            q: "مؤسس فيسبوك؟",
            options: ["إيلون ماسك", "مارك زوكربيرغ", "بيل غيتس", "ستيف جوبز"],
            answer: 1,
            tip: "مارك زوكربيرغ",
          },
          {
            q: "أسرع حيوان؟",
            options: ["السلحفاة", "الفهد", "الأسد", "الحصان"],
            answer: 1,
            tip: "الفهد",
          },
        ],
        3: [
          {
            q: "أطول نهر؟",
            options: ["النيل", "الأمازون", "الدانوب", "الغانج"],
            answer: 0,
            tip: "النيل",
          },
          {
            q: "عاصمة اليابان؟",
            options: ["أوساكا", "طوكيو", "كيوتو", "ناغويا"],
            answer: 1,
            tip: "طوكيو",
          },
          {
            q: "عدد الكواكب؟",
            options: ["7", "8", "9", "10"],
            answer: 1,
            tip: "8 كواكب",
          },
          {
            q: "أسرع حيوان بري؟",
            options: ["الأسد", "الفهد", "الظباء", "الذئب"],
            answer: 1,
            tip: "الفهد",
          },
          {
            q: "الغاز الرئيسي في الهواء؟",
            options: [
              "الأكسجين",
              "النيتروجين",
              "الهيدروجين",
              "ثاني أكسيد الكربون",
            ],
            answer: 1,
            tip: "النيتروجين",
          },
        ],
        // ... (يمكنك استكمال المستويات المتبقية أو تركها كما في الملف الأصلي)
      };

      // ----------------- UI و إجراءات المستخدم -----------------
      document
        .getElementById("login-btn")
        .addEventListener("click", async () => {
          const username = document
            .getElementById("username")
            .value.trim()
            .toLowerCase();
          const password = document.getElementById("password").value.trim();
          if (!username || !password) {
            showToast("تنبيه", "يرجى إدخال اسم المستخدم وكلمة المرور", "warn");
            return;
          }
          try {
            const userRef = ref(db, "users/" + username);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
              const data = snapshot.val();
              if (data.password === password) {
                currentUser = {
                  username,
                  passedLevels: data.passedLevels || [],
                  coins: data.coins || 0,
                };
                userCoins = data.coins || 0;
                coinCountEl.textContent = userCoins;
                showToast("🎉", "تم تسجيل الدخول بنجاح", "ok");
                showLevels();
              } else {
                showToast("خطأ", "كلمة المرور غير صحيحة", "err");
              }
            } else {
              await set(userRef, { password, passedLevels: [], coins: 0 });
              currentUser = { username, passedLevels: [], coins: 0 };
              userCoins = 0;
              coinCountEl.textContent = 0;
              showToast("✅", "تم إنشاء الحساب", "ok");
              showLevels();
            }
          } catch (e) {
            console.error(e);
            showToast("خطأ", "حدث خطأ أثناء الاتصال بقاعدة البيانات", "err");
          }
        });

      function showLevels() {
        if (!currentUser) return;
        loginSection.style.display = "none";
        levelsDiv.style.display = "flex";
        logoutBtn.style.display = "inline-block";
        leaderboardBtn.style.display = "inline-block";
        levelsDiv.innerHTML = "";
        const passed = currentUser.passedLevels || [];
        const highest = passed.length ? Math.max(...passed) : 0;
        Object.keys(levelsData).forEach((lvlStr) => {
          const lvl = +lvlStr;
          const card = document.createElement("div");
          card.className = "level-card";
          if (passed.includes(lvl)) {
            card.classList.add("passed");
            card.addEventListener("click", () => startLevel(lvl));
          } else if (lvl === highest + 1) {
            card.classList.add("open");
            card.addEventListener("click", () => startLevel(lvl));
          } else {
            card.classList.add("locked");
          }
          card.textContent = "المستوى " + lvl;
          levelsDiv.appendChild(card);
        });
      }

      function startLevel(level) {
        currentLevel = level;
        currentQuestions = structuredClone(questionsData[level] || []);
        currentQuestionIndex = 0;
        correctAnswers = 0;
        tipEl.style.display = "none";
        // تحقق كلمة مرور للمستوى 11 لو رغبت
        if (level === 11) {
          const password = prompt("أدخل كلمة المرور للمستوى 11:");
          if (password !== "admin") {
            showToast("خطأ", "كلمة المرور غير صحيحة", "warn");
            showLevels();
            return;
          }
        }
        // أظهر واجهة الأسئلة وخريطة التقدم (فكرة 3)
        levelsDiv.style.display = "none";
        questionBox.style.display = "block";
        levelsMapWrap.style.display = "flex";
        buildProgressMap(); // فكرة 3: بناء الخريطة حسب عدد الأسئلة
        renderQuestion();
      }

      // --- فكرة 3: بناء خريطة التقدم ديناميكياً ---
      function buildProgressMap() {
        progressMap.innerHTML = "";
        const total = currentQuestions.length;
        if (!total) {
          levelsMapWrap.style.display = "none";
          return;
        }
        for (let i = 0; i < total; i++) {
          const step = document.createElement("div");
          step.className = "progress-step";
          step.dataset.index = i;
          step.textContent = i + 1;
          step.addEventListener("click", () => {
            // اختيار للتنقل لسؤال محدد (اختياري) — فقط لو لم تريدي هذا السلوك احذفي الحدث
            currentQuestionIndex = i;
            renderQuestion();
            updateProgressMap(i);
          });
          progressMap.appendChild(step);
          if (i < total - 1) {
            const conn = document.createElement("div");
            conn.className = "progress-connector";
            progressMap.appendChild(conn);
          }
        }
        updateProgressMap(currentQuestionIndex);
      }

      function updateProgressMap(activeIndex) {
        const steps = progressMap.querySelectorAll(".progress-step");
        steps.forEach((el, idx) => {
          el.classList.toggle("completed", idx < activeIndex);
          el.classList.toggle("active", idx === activeIndex);
        });
        // تحديث البارك العادي أيضاً
        const percent = (activeIndex / (currentQuestions.length || 1)) * 100;
        progressEl.style.width = percent + "%";
      }

      // --- عرض سؤال ---
      function renderQuestion() {
        const q = currentQuestions[currentQuestionIndex];
        if (!q) {
          // آمن: لو ما فيه سؤال (مثلاً خطأ) => أنهِ المستوى
          endLevel();
          return;
        }
        document.getElementById("question-text").textContent = q.q;
        answersDiv.innerHTML = "";
        tipEl.style.display = "none";
        q.options.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.textContent = opt;
          btn.addEventListener("click", () => checkAnswer(i));
          answersDiv.appendChild(btn);
        });
        updateProgressMap(currentQuestionIndex);
      }

      function checkAnswer(i) {
        if (answering) return;
        answering = true;
        const q = currentQuestions[currentQuestionIndex];
        const buttons = answersDiv.querySelectorAll("button");
        buttons.forEach((b) => (b.disabled = true));

        if (i === q.answer) {
          try {
            correctSound.play();
          } catch (e) {}
          userCoins += 5;
          coinCountEl.textContent = userCoins;
          correctAnswers++;
          showToast("✅", "إجابة صحيحة", "ok");
        } else {
          try {
            wrongSound.play();
          } catch (e) {}
          // فكرة 3: إظهار التلميح/الإجابة الصحيحة داخل الواجهة (بدون الخروج)
          tipEl.style.display = "block";
          tipEl.textContent = `💡 الإجابة الصحيحة: ${q.options[q.answer]} — ${
            q.tip || ""
          }`;
          showToast("❌", "إجابة خاطئة —  ذاكري تاني", "err");
        }

        // انتقل للسؤال التالي مع تحديث الخريطة
        setTimeout(() => {
          answering = false;
          currentQuestionIndex++;
          if (currentQuestionIndex < currentQuestions.length) {
            renderQuestion();
          } else {
            endLevel();
          }
        }, 900);
      }

      async function endLevel() {
        questionBox.style.display = "none";
        levelsMapWrap.style.display = "none";
        levelsDiv.style.display = "flex";

        const passRate = correctAnswers / (currentQuestions.length || 1);
        if (passRate >= levelsData[currentLevel].passRate) {
          if (!currentUser.passedLevels.includes(currentLevel))
            currentUser.passedLevels.push(currentLevel);
          currentUser.coins = userCoins;
          try {
            await update(ref(db, "users/" + currentUser.username), {
              passedLevels: currentUser.passedLevels,
              coins: userCoins,
            });
            showToast("👏", "أحسنت! أنهيت المستوى " + currentLevel, "ok");
          } catch (e) {
            console.error(e);
            showToast("خطأ", "حدث خطأ أثناء حفظ النتائج", "err");
          }
          showLevels();
        } else {
          showToast(
            "خطأ",
            "لم تحقق النسبة المطلوبة (" +
              Math.round(levelsData[currentLevel].passRate * 100) +
              "%) حاول مرة أخرى",
            "warn"
          );
        }
      }

      // توست
      let toastTimer = null;
      function showToast(title, msg, type = "ok") {
        toastTitle.textContent = title;
        toastMsg.textContent = msg;
        toastEl.className =
          "toast show " +
          (type === "err" ? "err" : type === "warn" ? "warn" : "ok");
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2000);
      }

      // زر تسجيل خروج
      logoutBtn.addEventListener("click", async () => {
        if (currentUser) {
          try {
            await update(ref(db, "users/" + currentUser.username), {
              coins: userCoins,
            });
          } catch (e) {
            console.error(e);
          }
        }
        currentUser = null;
        userCoins = 0;
        coinCountEl.textContent = 0;
        loginSection.style.display = "block";
        levelsDiv.style.display = "none";
        logoutBtn.style.display = "none";
        leaderboardBtn.style.display = "none";
        showToast("✅", "تم تسجيل الخروج", "ok");
      });

      // لوحة المتصدرين
      leaderboardBtn.addEventListener("click", async () => {
        leaderboardCard.style.display = "block";
        levelsDiv.style.display = "none";
        lbList.innerHTML = "جارٍ التحميل...";
        try {
          const snapshot = await get(ref(db, "users"));
          if (snapshot.exists()) {
            const users = Object.entries(snapshot.val()).map(([u, data]) => ({
              name: u,
              coins: data.coins || 0,
              levels: data.passedLevels || [],
            }));
            users.sort((a, b) =>
              b.levels.length !== a.levels.length
                ? b.levels.length - a.levels.length
                : b.coins - a.coins
            );
            lbList.innerHTML = "";
            users.forEach((user, idx) => {
              const div = document.createElement("div");
              div.className = "leader-user";
              if (idx === 0) div.classList.add("first-place");
              div.innerHTML = `<div>${idx + 1}. <strong>${escapeHtml(
                user.name
              )}</strong><div style="font-size:12px;color:var(--muted)">المستويات: ${
                user.levels.length
              } • العملات: ${
                user.coins
              }</div></div><div class="levels">${user.levels
                .map((l) => `<span class="level-chip">${l}</span>`)
                .join("")}</div>`;
              lbList.appendChild(div);
            });
          } else lbList.innerHTML = "لا يوجد متصدرين بعد.";
        } catch (e) {
          console.error(e);
          lbList.innerHTML = "حدث خطأ أثناء جلب المتصدرين.";
        }
      });

      closeLeaderboardBtn.addEventListener("click", () => {
        leaderboardCard.style.display = "none";
        levelsDiv.style.display = "flex";
      });

      backLevelsBtn.addEventListener("click", () => {
        questionBox.style.display = "none";
        levelsDiv.style.display = "flex";
        levelsMapWrap.style.display = "none";
      });

      // أمان بسيط لمنع XSS في اسم المستخدم عند العرض
      function escapeHtml(unsafe) {
        return unsafe
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // init: nothing auto-logged in; ويمكن إضافة شاشة ترحيب لاحقاً
    </script>
  </body>
</html>
