<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <title>🔍 اختبار كلمة مرور المستوى 11</title>
    <style>
      body {
        font-family: Tajawal, sans-serif;
        padding: 20px;
        max-width: 600px;
        margin: auto;
      }
    </style>
  </head>
  <body>
    <h1>اختبار المستوى 11 - كلمة المرور "7"</h1>
    <p><strong>اضغط الزر → اكتب "7" → شوف النتيجة في Console (F12)</strong></p>

    <button
      onclick="testLevel11()"
      style="
        padding: 15px 30px;
        font-size: 18px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      "
    >
      🧪 اختبار "7"
    </button>

    <div
      id="result"
      style="
        margin-top: 20px;
        padding: 15px;
        background: #f0f8ff;
        border-radius: 10px;
      "
    ></div>

    <script>
      // نفس simpleHash من index.html
      function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          const char = str.charCodeAt(i);
          hash = (hash << 5) - hash + char;
          hash = hash & hash;
        }
        return Math.abs(hash).toString(16).padStart(8, "0");
      }

      // نفس obfuscatedHash11
      const obfuscatedHash11 = atob("MDAwMDAwMDM3");
      const expectedHash = obfuscatedHash11;

      function testLevel11() {
        const pass = prompt("أدخل كلمة مرور المستوى 11:");
        if (!pass) return;

        const trimmedPass = pass.trim();
        const inputHash = simpleHash(trimmedPass);

        console.log("=== DEBUG مستوى 11 ===");
        console.log("المدخل:", JSON.stringify(trimmedPass));
        console.log("الهاش المحسوب:", inputHash);
        console.log("الهاش المتوقع:", expectedHash);
        console.log(
          "المطابقة:",
          inputHash === expectedHash ? "✅ نجح!" : "❌ فشل",
        );
        console.log("======================");

        const result = document.getElementById("result");
        result.innerHTML = `
        <h3>النتيجة:</h3>
        <p><strong>مدخلك:</strong> "${trimmedPass}"</p>
        <p><strong>هاشك:</strong> <code>${inputHash}</code></p>
        <p><strong>متوقع:</strong> <code>${expectedHash}</code></p>
        <p style="color: ${inputHash === expectedHash ? "green" : "red"}; font-size: 24px; font-weight: bold;">
          ${inputHash === expectedHash ? "✅ الـ password صحيح! المستوى 11 يفترض يفتح" : "❌ خطأ - شوف Console"}
        </p>
        <p><strong>Console (F12):</strong> شوف DEBUG output بالتفصيل</p>
      `;

        if (inputHash === expectedHash) {
          alert("🎉 صح! لو مش بيفتح المستوى → Ctrl+Shift+R في index.html");
        } else {
          alert("❌ خطأ - شوف Console F12 وانسخ الـ DEBUG هنا");
        }
      }

      console.log(
        "✅ Test page loaded - Expected hash for level 11:",
        expectedHash,
      );
      console.log("simpleHash('7') =", simpleHash("7"));
    </script>
  </body>
</html>
