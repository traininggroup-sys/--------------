<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>اختبار المستوى لأعضاء جروب المشتركين</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg1: #0f1724;
        --bg2: #1e293b;
        --accent1: #ff8a65;
        --accent2: #ffca28;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Cairo", sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, var(--bg1), var(--bg2));
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }
      h1 {
        margin: 8px 0 14px;
        font-size: 24px;
        text-align: center;
      }
      .topbar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      button {
        cursor: pointer;
        border: 0;
        padding: 10px 14px;
        border-radius: 12px;
        font-weight: 700;
        background: linear-gradient(45deg, var(--accent1), #ff7043);
        color: #fff;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
        transition: background 0.3s ease;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }
      button.ghost {
        background: linear-gradient(45deg, #455a64, #607d8b);
      }
      button.danger {
        background: linear-gradient(45deg, #d32f2f, #f44336);
      }
      button.ok {
        background: linear-gradient(45deg, #2e7d32, #66bb6a);
      }
      .card {
        display: none; /* اخفاء افتراضي */
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        max-width: 400px;
        width: 90%;
        background: rgba(15, 23, 36, 0.85);
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
        z-index: 1000;
        max-height: 90vh;
        overflow-y: auto;
      }
      .card.show {
        display: block;
      }
      .centered {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      input {
        padding: 12px;
        border-radius: 10px;
        border: 0;
        background: rgba(255, 255, 255, 0.03);
        color: #fff;
        outline: none;
        font-weight: 700;
      }
      input::placeholder {
        color: #ccc;
      }
      input:focus {
        box-shadow: 0 0 0 3px rgba(255, 202, 40, 0.12);
      }
      .level-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px;
        border-radius: 12px;
        margin: 10px 0;
        background: rgba(255, 255, 255, 0.02);
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        font-weight: 800;
        transition: background 0.3s ease, color 0.3s ease;
      }
      .level-card.open:hover {
        background: linear-gradient(90deg, #64b5f6, #42a5f5);
        color: #fff;
      }
      .level-card.open {
        background: linear-gradient(90deg, #4caf50, #81c784);
        color: #fff;
      }
      .level-card.passed {
        background: linear-gradient(90deg, #ffeb3b, #fdd835);
        color: #111;
      }
      .level-card.locked {
        background: #444;
        color: #bbb;
        cursor: not-allowed;
      }
      .question {
        font-size: 18px;
        margin: 6px 0 10px;
      }
      .answers button {
        display: block;
        width: 100%;
        margin: 8px 0;
        padding: 12px;
        border-radius: 10px;
        background: linear-gradient(135deg, #29b6f6, #0288d1);
        font-weight: 700;
        transition: background 0.3s ease;
      }
      .answers button:hover:not(:disabled) {
        background: linear-gradient(135deg, #03a9f4, #0277bd);
      }
      .leader-user {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 15px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.25);
        margin: 8px 0;
        font-weight: 700;
        font-size: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        transition: background 0.3s ease;
      }
      .leader-user:hover {
        background: rgba(0, 0, 0, 0.4);
      }
      .leader-user .levels {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .leader-user .level-chip {
        background: #ffca28;
        color: #111;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 700;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        user-select: none;
      }
      pre {
        white-space: pre-wrap;
        background: rgba(0, 0, 0, 0.35);
        padding: 10px;
        border-radius: 10px;
        max-height: 300px;
        overflow-y: auto;
      }
      .subtle {
        opacity: 0.85;
        font-size: 13px;
      }
      .toast {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 16px;
        background: rgba(0, 0, 0, 0.7);
        padding: 12px 16px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        display: flex;
        gap: 12px;
        align-items: center;
        z-index: 9999;
        opacity: 0;
        transition: opacity 0.18s, transform 0.18s;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .toast.ok {
        background: linear-gradient(90deg, #2e7d32, #388e3c);
      }
      .toast.warn {
        background: linear-gradient(90deg, #c62828, #ef5350);
      }
      @media (max-width: 600px) {
        h1 {
          font-size: 18px;
        }
        .card {
          padding: 12px;
          max-width: 95%;
        }
        .topbar {
          gap: 8px;
        }
        .leader-user {
          flex-direction: column;
          align-items: flex-start;
          gap: 6px;
        }
        .leader-user .levels {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <h1>اختبار المستوى لأعضاء جروب المشتركين</h1>

    <div class="topbar">
      <button id="leaderboard-btn" class="ghost">لوحة المتصدرين 🏆</button>
      <button id="back-to-levels-btn" class="danger" style="display: none">
        عودة للمستويات
      </button>
      <button id="logout-btn" class="danger" style="display: none">خروج</button>
    </div>

    <!-- Login -->
    <div id="login-section" class="card show">
      <div class="centered">
        <input
          id="username"
          placeholder="اسم المستخدم (لا أحرف خاصة - ننصح بحروف صغيرة)"
          autocomplete="username"
        />
        <input
          id="password"
          type="password"
          placeholder="كلمة المرور"
          autocomplete="current-password"
        />
        <button id="login-btn" class="ok">دخول / تسجيل</button>
        <div class="subtle">
          ملاحظة: لو الاسم موجود سابقًا يجب إدخال نفس كلمة المرور، وإلا سيُرفض.
        </div>
      </div>
    </div>

    <!-- Levels -->
    <div id="levels" class="card"></div>

    <!-- Question box -->
    <div id="question-box" class="card">
      <div class="question" id="question-text"></div>
      <div id="answers" class="answers"></div>
      <div style="display: flex; justify-content: flex-end; margin-top: 10px">
        <button id="back-levels-btn" class="danger">عودة للمستويات</button>
      </div>
    </div>

    <!-- Review -->
    <div id="review-box" class="card">
      <h3 id="review-title" style="margin: 0 0 8px"></h3>
      <pre id="review-content"></pre>
      <div style="display: flex; justify-content: flex-end; margin-top: 10px">
        <button id="back-review-btn" class="danger">عودة للمستويات</button>
      </div>
    </div>

    <!-- Leaderboard -->
    <div id="leaderboard" class="card">
      <h3 style="margin: 0 0 10px">لوحة المتصدرين</h3>
      <div id="leaderboard-list"></div>
    </div>

    <!-- sounds -->
    <audio
      id="correct-sound"
      src="https://www.soundjay.com/button/sounds/button-4.mp3"
      preload="auto"
    ></audio>
    <audio
      id="wrong-sound"
      src="https://www.soundjay.com/button/sounds/button-10.mp3"
      preload="auto"
    ></audio>

    <!-- toast -->
    <div id="toast" class="toast" aria-live="polite" aria-atomic="true">
      <strong id="toast-title"></strong>
      <div id="toast-msg" style="margin-left: 8px"></div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        get,
        set,
        update,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDrPR-5-IaSD7-ij1oj3Y4M9ARQBMK66eo",
        authDomain: "levels-409ba.firebaseapp.com",
        databaseURL: "https://levels-409ba-default-rtdb.firebaseio.com/",
        projectId: "levels-409ba",
        storageBucket: "levels-409ba.appspot.com",
        messagingSenderId: "54945336454",
        appId: "1:54945336454:web:51e6f513c1d2a91e23d507",
      };
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      let currentUser = null,
        currentLevel = 1,
        currentQuestionIndex = 0,
        currentQuestions = [],
        answering = false;

      const levelsData = {
        1: { questions: 5, passRate: 0.7 },
        2: { questions: 5, passRate: 0.8 },
        3: { questions: 5, passRate: 0.9 },
      };
      const questionsData = {
        1: [
          {
            q: "ما هو لون السماء؟",
            options: ["أزرق", "أخضر", "أحمر", "أسود"],
            answer: 0,
            tip: "تذكر لون السماء في النهار",
          },
          {
            q: "كم عدد أيام الأسبوع؟",
            options: ["5", "6", "7", "8"],
            answer: 2,
            tip: "أيام الأسبوع 7",
          },
          {
            q: "ما هو الكوكب الأقرب للشمس؟",
            options: ["الزهرة", "الأرض", "عطارد", "المريخ"],
            answer: 2,
            tip: "عطارد هو الأقرب",
          },
          {
            q: "أين توجد الأهرامات؟",
            options: ["مصر", "اليونان", "اليابان", "أمريكا"],
            answer: 0,
            tip: "بلد الأهرامات هي مصر",
          },
          {
            q: "كم عدد أصابع اليد؟",
            options: ["4", "5", "6", "7"],
            answer: 1,
            tip: "الإنسان عادة 5 أصابع باليد",
          },
        ],
        2: [
          {
            q: "ما هو أكبر محيط؟",
            options: ["الهادي", "الأطلسي", "الهندي", "المتجمد"],
            answer: 0,
            tip: "المحيط الهادي أكبر المحيطات",
          },
          {
            q: "أين تقع باريس؟",
            options: ["ألمانيا", "فرنسا", "إيطاليا", "إسبانيا"],
            answer: 1,
            tip: "باريس هي عاصمة فرنسا",
          },
          {
            q: "ما هو رمز الماء الكيميائي؟",
            options: ["H2O", "CO2", "O2", "NaCl"],
            answer: 0,
            tip: "H2O هو رمز الماء",
          },
          {
            q: "من هو مؤسس فيسبوك؟",
            options: ["إيلون ماسك", "مارك زوكربيرغ", "بيل غيتس", "ستيف جوبز"],
            answer: 1,
            tip: "مارك هو مؤسس فيسبوك",
          },
          {
            q: "ما هو الحيوان الأسرع؟",
            options: ["السلحفاة", "الفهد", "الأسد", "الحصان"],
            answer: 1,
            tip: "الفهد أسرع حيوان بري",
          },
        ],
        3: [
          {
            q: "ما هو أطول نهر في العالم؟",
            options: ["النيل", "الأمازون", "الدانوب", "الغانج"],
            answer: 0,
            tip: "النيل يعتبر الأطول تقليديًا",
          },
          {
            q: "ما هي عاصمة اليابان؟",
            options: ["أوساكا", "طوكيو", "كيوتو", "ناغويا"],
            answer: 1,
            tip: "طوكيو عاصمة اليابان",
          },
          {
            q: "كم عدد الكواكب في المجموعة الشمسية؟",
            options: ["7", "8", "9", "10"],
            answer: 1,
            tip: "يوجد 8 كواكب بعد إزالة بلوتو من القائمة الرسمية",
          },
          {
            q: "ما هو أسرع حيوان بري؟",
            options: ["الأسد", "الفهد", "الظباء", "الذئب"],
            answer: 1,
            tip: "الفهد الأسرع",
          },
          {
            q: "ما هو الغاز الرئيسي في الهواء؟",
            options: [
              "الأكسجين",
              "النيتروجين",
              "الهيدروجين",
              "ثاني أكسيد الكربون",
            ],
            answer: 1,
            tip: "النيتروجين يشكل ~78% من الهواء",
          },
        ],
      };

      const loginSection = document.getElementById("login-section");
      const levelsDiv = document.getElementById("levels");
      const questionBox = document.getElementById("question-box");
      const answersDiv = document.getElementById("answers");
      const leaderboardCard = document.getElementById("leaderboard");
      const lbList = document.getElementById("leaderboard-list");
      const reviewBox = document.getElementById("review-box");
      const reviewTitle = document.getElementById("review-title");
      const reviewContent = document.getElementById("review-content");
      const leaderboardBtn = document.getElementById("leaderboard-btn");
      const backToLevelsBtn = document.getElementById("back-to-levels-btn");
      const backLevelsBtn = document.getElementById("back-levels-btn");
      const logoutBtn = document.getElementById("logout-btn");
      const toastEl = document.getElementById("toast"),
        toastTitle = document.getElementById("toast-title"),
        toastMsg = document.getElementById("toast-msg");
      const correctSound = document.getElementById("correct-sound");
      // ======= toast =======
      function showToast(type, title, msg, t = 2200) {
        toastEl.className = "toast show " + (type === "ok" ? "ok" : "warn");
        toastTitle.textContent = title || "";
        toastMsg.textContent = msg || "";
        clearTimeout(toastEl._t);
        toastEl._t = setTimeout(() => (toastEl.className = "toast"), t);
      }

      // ======= التسجيل / الدخول =======
      document
        .getElementById("login-btn")
        .addEventListener("click", async () => {
          let name = document.getElementById("username").value.trim();
          let pass = document.getElementById("password").value.trim();
          if (!name || !pass) {
            showToast("warn", "بيانات ناقصة", "اكتب اسم المستخدم وكلمة المرور");
            return;
          }
          // normalize
          name = name.toLowerCase().replace(/\s+/g, "-");
          try {
            const userRef = ref(db, `users/${name}`);
            const snap = await get(userRef);
            if (snap.exists()) {
              const data = snap.val();
              if (data.password !== pass) {
                showToast("warn", "خطأ", "كلمة المرور خاطئة");
                return;
              }
              currentUser = name;
              if (!data.progress)
                await update(userRef, {
                  progress: { 1: false, 2: false, 3: false },
                });
              if (!data.answers) await update(userRef, { answers: {} });
              showToast("ok", "تم الدخول", `أهلًا ${name}`);
            } else {
              await set(userRef, {
                password: pass,
                createdAt: Date.now(),
                progress: { 1: false, 2: false, 3: false },
                answers: {},
              });
              currentUser = name;
              showToast("ok", "تم التسجيل", "تم إنشاء الحساب وتسجيل الدخول");
            }
            logoutBtn.style.display = "inline-flex";
            backToLevelsBtn.style.display = "none";
            leaderboardBtn.style.display = "inline-flex";
            await renderLevels();
          } catch (err) {
            console.error(err);
            showToast(
              "warn",
              "خطأ",
              "حصل خطأ، تأكد من اتصال الإنترنت وبيانات Firebase"
            );
          }
        });

      // زر الخروج
      logoutBtn.addEventListener("click", () => {
        currentUser = null;
        logoutBtn.style.display = "none";
        backToLevelsBtn.style.display = "none";
        leaderboardBtn.style.display = "inline-flex";
        showOnly(loginSection);
      });

      // ======= عرض المستويات =======
      function createLevelCard(i, status) {
        const div = document.createElement("div");
        div.className = "level-card " + status;
        const left = document.createElement("div");
        left.textContent = `المستوى ${i}`;
        const right = document.createElement("div");
        right.textContent =
          status === "passed" ? "✅" : status === "open" ? "🔓" : "🔒";
        div.appendChild(left);
        div.appendChild(right);
        if (status !== "locked")
          div.addEventListener("click", () => startLevel(i));
        return div;
      }

      async function renderLevels() {
        if (!currentUser) {
          showOnly(loginSection);
          return;
        }
        levelsDiv.innerHTML = "";
        try {
          const snap = await get(ref(db, `users/${currentUser}`));
          const progress = (snap.exists() && snap.val().progress) || {
            1: false,
            2: false,
            3: false,
          };
          for (let i = 1; i <= 3; i++) {
            const status = progress[i]
              ? "passed"
              : i === 1 || progress[i - 1]
              ? "open"
              : "locked";
            levelsDiv.appendChild(createLevelCard(i, status));
          }
          showOnly(levelsDiv);
        } catch (e) {
          console.error(e);
          showToast("warn", "خطأ", "فشل جلب حالات المستويات");
        }
      }

      // ======= بدء وعرض السؤال =======
      function startLevel(level) {
        currentLevel = level;
        currentQuestionIndex = 0;
        currentQuestions = questionsData[level] || [];
        if (currentQuestions.length === 0) {
          showToast("warn", "خطأ", "لا توجد أسئلة لهذا المستوى");
          return;
        }
        showOnly(questionBox);
        showQuestion();
      }

      function showQuestion() {
        const q = currentQuestions[currentQuestionIndex];
        document.getElementById("question-text").textContent = q.q;
        answersDiv.innerHTML = "";
        answering = false;
        q.options.forEach((opt, idx) => {
          const b = document.createElement("button");
          b.textContent = opt;
          b.disabled = false;
          b.addEventListener("click", () => answerQuestion(idx, b));
          answersDiv.appendChild(b);
        });
      }

      // ======= الإجابة وتخزينها =======
      async function answerQuestion(selected, btn) {
        if (answering) return; // منع تكرار الضغط
        answering = true;
        // تعطيل كل الأزرار
        Array.from(answersDiv.children).forEach((b) => (b.disabled = true));

        const q = currentQuestions[currentQuestionIndex];
        const isCorrect = selected === q.answer;

        try {
          if (isCorrect) {
            await correctSound.play();
          } else {
            await wrongSound.play();
          }
        } catch (e) {
          // قد لا يعمل الصوت بدون تفاعل مسبق
        }

        try {
          await set(
            ref(
              db,
              `users/${currentUser}/answers/${currentLevel}/${
                currentQuestionIndex + 1
              }`
            ),
            isCorrect
          );
        } catch (e) {
          console.error(e);
          showToast("warn", "خطأ", "فشل حفظ الإجابة");
        }
        currentQuestionIndex++;
        if (currentQuestionIndex >= currentQuestions.length) {
          await checkLevelCompletion();
        } else {
          showQuestion();
        }
      }

      backLevelsBtn.addEventListener("click", () => renderLevels());

      // ======= تحقق اجتياز المستوى =======
      async function checkLevelCompletion() {
        try {
          const snap = await get(
            ref(db, `users/${currentUser}/answers/${currentLevel}`)
          );
          const answers = snap.val() || {};
          const total = Object.keys(answers).length;
          const correct = Object.values(answers).filter(Boolean).length;
          const required = Math.ceil(levelsData[currentLevel].passRate * total);
          if (correct >= required) {
            await update(ref(db, `users/${currentUser}/progress`), {
              [currentLevel]: true,
            });
            showToast(
              "ok",
              "تم الاجتياز",
              `لقد أجبت صح ${correct} من ${total}`
            );
          } else {
            showToast(
              "warn",
              "لم تُجتز",
              `صح ${correct}/${total} — مطلوب ${required}`
            );
          }
          await renderLevels();
        } catch (e) {
          console.error(e);
          showToast("warn", "خطأ", "فشل التحقق من النتيجة");
        }
      }

      // ======= لوحة المتصدرين =======
      leaderboardBtn.addEventListener("click", () => displayLeaderboard());
      backToLevelsBtn.addEventListener("click", () => {
        backToLevelsBtn.style.display = "none";
        if (currentUser) renderLevels();
        else showOnly(loginSection);
      });

      async function displayLeaderboard() {
        lbList.innerHTML = "";
        try {
          const snap = await get(ref(db, "users"));
          if (!snap.exists()) {
            lbList.textContent = "لا يوجد بيانات بعد";
            showOnly(leaderboardCard);
            backToLevelsBtn.style.display = "inline-flex";
            return;
          }
          const users = snap.val();
          Object.keys(users).forEach((name) => {
            const user = users[name];
            const progress = user.progress || {};
            const row = document.createElement("div");
            row.className = "leader-user";
            const left = document.createElement("div");
            left.textContent = name; // استخدم textContent لتجنب XSS
            const right = document.createElement("div");
            right.className = "levels";
            Object.keys(progress).forEach((level) => {
              if (progress[level]) {
                const chip = document.createElement("span");
                chip.className = "level-chip";
                chip.textContent = `المستوى ${level}`;
                right.appendChild(chip);
              }
            });
            row.appendChild(left);
            row.appendChild(right);
            lbList.appendChild(row);
          });
          showOnly(leaderboardCard);
          backToLevelsBtn.style.display = "inline-flex";
        } catch (e) {
          console.error(e);
          showToast("warn", "خطأ", "فشل تحميل المتصدرين");
        }
      }

      // ======= مراجعة الإجابات =======
      // (تم حذف زر التفاصيل، لذا هذه الدالة غير مرتبطة حالياً)

      // ======= مساعدة لعرض عنصر واحد =======
      function showOnly(el) {
        [
          loginSection,
          levelsDiv,
          questionBox,
          leaderboardCard,
          reviewBox,
        ].forEach((c) => {
          if (c === el) {
            c.classList.add("show");
            c.style.display = "block";
          } else {
            c.classList.remove("show");
            c.style.display = "none";
          }
        });
      }

      // ======= بدء الصفحة =======
      showOnly(loginSection);
      logoutBtn.style.display = "none";
      backToLevelsBtn.style.display = "none";
      leaderboardBtn.style.display = "inline-flex";
    </script>
  </body>
</html>
