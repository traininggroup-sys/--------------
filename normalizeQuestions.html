<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>تصحيح مصفوفة الأسئلة</title>
    <style>
      body {
        font-family: Tahoma, sans-serif;
        padding: 20px;
      }
      textarea {
        width: 100%;
        height: 200px;
      }
      pre {
        background: #f0f0f0;
        padding: 10px;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <h2>أدخل مصفوفة الأسئلة هنا</h2>
    <textarea id="input"></textarea>
    <button onclick="processQuestions()">تحويل وتصحيح</button>

    <h2>النتيجة:</h2>
    <pre id="output"></pre>

    <script>
      function cleanJSON(input) {
        // إزالة الفواصل قبل } أو ]
        let cleaned = input.replace(/,\s*([\]}])/g, "$1");
        // إزالة أي أسطر فارغة أو مسافات غير ضرورية
        cleaned = cleaned.replace(/^\s*[\r\n]/gm, "");
        return cleaned;
      }

      function processQuestions() {
        let raw = document.getElementById("input").value;
        let result = [];

        try {
          let cleaned = cleanJSON(raw);
          let data = JSON.parse(cleaned);

          data.forEach((q) => {
            let question = q.question || "";
            let options = Array.isArray(q.options) ? q.options : [];
            let answer = q.answer || "";

            if (typeof answer === "number" && options[answer] !== undefined) {
              answer = options[answer];
            }

            let explanation = q.explanation || "";

            result.push({
              question: question,
              options: options,
              correct_option: answer,
              explanation: explanation,
            });
          });

          document.getElementById("output").textContent = JSON.stringify(
            result,
            null,
            2,
          );
        } catch (e) {
          document.getElementById("output").textContent =
            "خطأ في معالجة المصفوفة: " + e;
        }
      }
    </script>
  </body>
</html>
