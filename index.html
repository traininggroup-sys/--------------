<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>اختبار المستوى - جروب المشتركين</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ============================================
* Minimalist Warm Professional Theme - تصميم بسيط، دافئ، ومحترف 
* Primary Accent: #007bff (Professional Blue)
* Secondary Accent: #ffc107 (Warm Amber)
============================================
*/
      :root {
        --bg: #f8f9fa; /* Light, warm background */
        --card: #ffffff; /* Pure white cards */
        --accent: #007bff; /* Professional Blue */
        --accent-secondary: #ffc107; /* Warm Amber for contrast */
        --text: #343a40; /* Darker, but not black, text */
        --muted: #6c757d; /* Muted gray text */
        --success: #28a745;
        --error: #dc3545;
        --lock: #adb5bd;
        --shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05); /* Very light, soft shadow */
      }
      * {
        box-sizing: border-box;
        font-family: "Cairo", sans-serif;
        direction: rtl;
        transition: all 0.2s ease-out; /* Smooth transitions for a polished feel */
      }
      body {
        margin: 0;
        padding: 25px;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-weight: 400;
        user-select: none;
        line-height: 1.6;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 30px;
        flex-wrap: wrap;
        gap: 15px;
        padding-bottom: 20px;
        border-bottom: 1px solid #e9ecef; /* Simple, clean divider */
      }
      h1 {
        margin: 0;
        font-size: 32px; /* Larger title */
        color: var(--accent);
        font-weight: 700;
      }
      h3 {
        margin: 0;
        font-size: 18px;
        color: var(--accent-secondary);
        font-weight: 700;
      }
      .top-controls {
        display: flex;
        gap: 15px;
        align-items: center;
        flex-direction: row;
      }
      .coin-container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        background: var(--card);
        padding: 10px 18px;
        border-radius: 10px;
        border: 1px solid #dee2e6; /* Soft border for definition */
        box-shadow: var(--shadow);
      }
      .coin-container span {
        font-weight: 900;
        color: var(--text);
      }
      .coin-float {
        /* ... (Keep float animation) ... */
      }
      .coin-float.show {
        /* ... (Keep float animation) ... */
      }
      @keyframes floatUp {
        /* ... (Keep float animation) ... */
      }

      button {
        cursor: pointer;
        padding: 12px 22px;
        background: var(--accent);
        border: none;
        color: white;
        font-weight: 700;
        border-radius: 8px;
        transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      button:hover {
        background: #0056b3; /* Darker shade on hover */
        transform: translateY(-2px);
        box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15);
      }
      button:disabled {
        background: var(--lock);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
        color: var(--card);
      }

      /* Login Section */
      #login-section {
        background: var(--card);
        padding: 30px;
        border-radius: 10px;
        box-shadow: var(--shadow);
        border: 1px solid #e9ecef;
      }
      .input-row {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
      }
      input[type="text"],
      input[type="password"] {
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ced4da;
        background: #ffffff;
        color: var(--text);
        width: 250px;
        font-size: 16px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      input[type="text"]:focus,
      input[type="password"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        outline: none;
      }
      input[type="text"]::placeholder,
      input[type="password"]::placeholder {
        color: var(--muted);
      }
      #login-btn {
        background: var(--accent-secondary);
        color: var(--text); /* Dark text on light accent */
        font-weight: 900;
      }
      #login-btn:hover {
        background: #e0a800;
      }
      #logout-btn {
        margin-top: 20px;
        background: var(--error);
        color: white;
      }
      #logout-btn:hover {
        background: #c82333;
      }

      /* Levels Section */
      #levels {
        display: none;
        margin-top: 30px;
        gap: 20px;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .level-card {
        width: 100%;
        max-width: 500px;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        font-weight: 700;
        cursor: pointer;
        background: var(--card);
        border: 1px solid #e9ecef;
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 22px;
        color: var(--text);
        box-shadow: 0 3px 6px rgba(0, 0, 0, 0.08);
      }
      .level-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        border-color: var(--accent);
      }
      .level-card.open {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .level-card.open:hover {
        background: #0056b3;
      }
      .level-card.passed {
        background: var(--success);
        color: white;
        border-color: var(--success);
      }
      .level-card.passed:hover {
        background: #218838;
      }
      .level-card.locked {
        background: #f1f3f5; /* Very light gray */
        color: var(--muted);
        cursor: not-allowed;
        border-color: #dee2e6;
        opacity: 0.8;
        box-shadow: none;
      }
      .level-card.locked:hover {
        transform: none;
        box-shadow: none;
      }

      /* Question Box */
      #question-box {
        display: none;
        background: var(--card);
        padding: 30px;
        border-radius: 10px;
        margin-top: 30px;
        border: 1px solid #e9ecef;
        box-shadow: var(--shadow);
      }
      #question-info {
        font-size: 16px;
        margin-bottom: 15px;
        color: var(--muted);
      }
      .progress-bar {
        width: 100%;
        height: 10px;
        background: #e9ecef;
        border-radius: 5px;
        overflow: hidden;
        margin-bottom: 20px;
      }
      .progress-fill {
        height: 100%;
        background: var(--accent-secondary);
        transition: width 0.4s ease-out;
      }
      #question-text {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 25px;
        color: var(--text);
        border-right: 3px solid var(--accent);
        padding-right: 15px;
      }
      #answers {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #tip {
        margin-top: 20px;
        font-size: 14px;
        color: var(--muted);
        background: #fff3cd; /* Light amber/yellow background for tips */
        padding: 10px 15px;
        border-radius: 8px;
        border-right: 3px solid #ffc107;
        color: #856404; /* Darker text for visibility */
      }
      #answers label {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 15px;
        border-radius: 8px;
        background: #f8f9fa;
        color: var(--text);
        cursor: pointer;
        transition: background-color 0.15s, border-color 0.15s;
        border: 1px solid #dee2e6;
        font-weight: 600;
      }
      #answers label:hover {
        background: #e9ecef;
        border-color: var(--accent);
      }
      #answers input[type="radio"]:checked + span {
        color: var(--accent);
        font-weight: 700;
      }
      #next-button {
        margin-top: 25px;
        width: 100%;
        background: var(--accent);
        color: white;
      }
      #next-button:hover {
        background: #0056b3;
      }
      .back-btn {
        background: var(--muted);
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        margin-top: 15px;
        font-weight: 700;
      }
      .back-btn:hover {
        background: #5a6268;
      }

      /* Result Section */
      #result {
        display: none;
        background: var(--card);
        padding: 30px;
        border-radius: 10px;
        margin-top: 30px;
        border: 1px solid #e9ecef;
        box-shadow: var(--shadow);
      }
      #score {
        font-size: 28px;
        font-weight: 900;
        margin-bottom: 20px;
        color: var(--accent);
      }
      .review-item {
        margin-bottom: 15px;
        padding: 15px;
        border-radius: 10px;
        background: #f8f9fa;
        border-right: 5px solid transparent;
      }
      .review-item.correct {
        background: #d4edda; /* Light green background */
        border-color: var(--success);
        color: #155724;
      }
      .review-item.incorrect {
        background: #f8d7da; /* Light red background */
        border-color: var(--error);
        color: #721c24;
      }

      /* Leaderboard Modal */
      #leaderboard {
        display: none;
        position: fixed;
        inset: 5% 5%;
        background: var(--card);
        padding: 30px;
        border-radius: 15px;
        z-index: 60;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-height: 90vh;
        overflow-y: auto;
        border: 2px solid var(--accent);
        color: var(--text);
      }
      #leaderboard h2 {
        color: var(--accent);
        margin: 0 0 20px 0;
        font-size: 30px;
        text-align: center;
      }
      .leader-user {
        padding: 15px 20px;
        border-radius: 10px;
        margin-bottom: 10px;
        background: #f1f3f5;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: transform 0.2s, box-shadow 0.2s;
        border-right: 4px solid var(--muted);
      }
      .leader-user:hover {
        transform: scale(1.01);
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
      }
      .leader-user.first-place {
        background: #ffffe0;
        color: #333;
        border-right: 4px solid #ffc107;
      }
      .leader-user.second-place {
        background: #f8f9fa;
        color: #333;
        border-right: 4px solid #adb5bd;
      }
      .leader-user.third-place {
        background: #f4e9d9;
        color: #333;
        border-right: 4px solid #795548;
      }
      .leader-user .rank {
        font-size: 28px;
        font-weight: 900;
        margin-left: 15px;
        min-width: 40px;
        text-align: center;
        color: var(--accent);
      }
      .leader-user.first-place .rank,
      .leader-user.second-place .rank,
      .leader-user.third-place .rank {
        color: var(--text);
      }
      .leader-user .user-info {
        flex: 1;
        margin-right: 15px;
      }
      .leader-user .user-name {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 5px;
        color: var(--text);
      }
      .leader-user .user-stats {
        font-size: 14px;
        opacity: 0.8;
        color: var(--muted);
      }
      .level-chip {
        background: #e9ecef;
        padding: 4px 8px;
        border-radius: 10px;
        font-size: 13px;
        margin: 3px;
        display: inline-block;
        border: 1px solid var(--accent-secondary);
        color: var(--accent-secondary);
        font-weight: 600;
      }
      .levels {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }

      /* Level Modal */
      .level-modal {
        display: none;
        position: fixed;
        inset: 20% 10%;
        background: #ffffff; /* White modal background */
        padding: 30px;
        border-radius: 15px;
        z-index: 70;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        max-height: 60vh;
        overflow: auto;
        border: 2px solid var(--accent);
        text-align: center;
        color: var(--text);
      }
      .level-modal h3 {
        color: var(--accent);
        margin: 0 0 15px 0;
        font-size: 28px;
        font-weight: 900;
      }
      .level-modal p {
        color: var(--muted);
        margin: 15px 0;
        font-size: 18px;
      }
      .level-modal .modal-buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-top: 25px;
      }
      .level-modal .close-modal {
        position: absolute;
        top: 10px;
        right: 10px;
        background: none;
        border: none;
        color: var(--muted);
        font-size: 30px;
        cursor: pointer;
        opacity: 0.8;
      }
      #modal-start-btn {
        background: var(--success);
        color: white;
      }
      #modal-buy-btn {
        background: var(--accent-secondary);
        color: var(--text);
        font-weight: 700;
      }

      /* Toast Notifications */
      .toast {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 30px;
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 12px 20px;
        border-radius: 10px;
        background: var(--text); /* Dark background for high contrast */
        color: white;
        z-index: 80;
        opacity: 0;
        transition: opacity 0.3s;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }
      .toast.show {
        opacity: 1;
      }
      .toast.ok {
        background: var(--success);
      }
      .toast.warn {
        background: var(--accent-secondary);
        color: var(--text);
      }
      .toast.err {
        background: var(--error);
      }
      #toast-title {
        font-size: 18px;
        font-weight: 700;
      }

      .footer-note {
        margin-top: 30px;
        color: var(--muted);
        font-size: 14px;
        text-align: center;
      }

      @media (max-width: 640px) {
        body {
          padding: 15px;
        }
        header {
          flex-direction: column;
          align-items: center;
        }
        .top-controls {
          width: 100%;
          justify-content: space-around;
        }
        .input-row {
          flex-direction: column;
          align-items: stretch;
        }
        input[type="text"],
        input[type="password"] {
          width: 100%;
        }
        #leaderboard {
          inset: 3% 3%;
        }
        .level-card {
          max-width: 100%;
        }
      }
      img#egypounds {
        width: 40px; /* Smaller coin image */
      }
      strong {
        font-size: 20px;
        font-weight: 900;
      }
    </style>
  </head>

      const closeLeaderboardBtn = document.getElementById(
        "close-leaderboard-btn"
      );

      const toastEl = document.getElementById("toast"),
        toastTitle = document.getElementById("toast-title"),
        toastMsg = document.getElementById("toast-msg");

      const correctSound = document.getElementById("correct-sound");
      const wrongSound = document.getElementById("wrong-sound");
      const coinCountEl = document.getElementById("coin-count");
      const tipEl = document.getElementById("tip");
      const progressEl = document.getElementById("progress");
      const questionInfoEl = document.getElementById("question-info");

      let leaderboardUnsubscribe = null;

      // حالة التطبيق (تعريف وحيد، لا تكرار)
      let currentUser = null;
      let currentLevel = 1;
      let currentQuestionIndex = 0;
      let currentQuestions = [];
      let answering = false;
      let correctAnswers = 0;
      let userCoins = 0;
      let userAnswers = []; // Track user answers for review
      let levelTimer = null;
      let timeLeft = 0;

      function updateTimerDisplay() {
        const questionInfoEl = document.getElementById("question-info");
        const progressFill = document.querySelector(".progress-fill");
        const totalTime = levelsData[currentLevel].time;
        const progressPercent = (timeLeft / totalTime) * 100;
        progressFill.style.width = progressPercent + "%";
        progressFill.style.backgroundColor =
          timeLeft < 10 ? "var(--error)" : "var(--accent-secondary)";
        questionInfoEl.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span>السؤال ${currentQuestionIndex + 1} من ${
          currentQuestions.length
        }</span>
            <div id="timer" style="color: ${
              timeLeft < 10 ? "var(--error)" : "var(--accent-secondary)"
            }; font-weight: bold;">
              الوقت المتبقي: ${timeLeft} ثانية
            </div>
          </div>
        `;
      }

      function updateTimer() {
        timeLeft--;
        if (timeLeft <= 0) {
          clearInterval(levelTimer);
          levelTimer = null;
          showToast("⏰", "انتهى الوقت!", "err");
          endLevel();
        } else {
          updateTimerDisplay();
        }

            coinCountEl.textContent = userCoins;
            currentUser.passedLevels.push(selectedLevel);
            currentUser.coins = userCoins;
            try {
              await update(ref(db, "users/" + currentUser.username), {
                passedLevels: currentUser.passedLevels,
                coins: userCoins,
              });
              showToast("✅", `تم شراء المستوى ${selectedLevel}`, "ok");
              levelModal.style.display = "none";
              showLevels();
            } catch (e) {
              console.error(e);
              showToast("خطأ", "حدث خطأ أثناء الشراء", "err");
              // استرجاع العملات لو فشل
              userCoins += price;
              coinCountEl.textContent = userCoins;
              currentUser.passedLevels.pop();
            }
          } else {
            showToast("❌", "لسه منجحتش في المستوي السابق", "err");

          if (!username || !password) {
            showToast("تنبيه", "يرجى إدخال اسم المستخدم وكلمة المرور", "warn");
            return;
          }
          // تعطيل الزر وتغيير النص إلى "جاري التحميل..."
          loginBtn.disabled = true;
          loginBtn.textContent = "جاري التحميل...";
          try {
            const userRef = ref(db, "users/" + username);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
              const data = snapshot.val();
              if (data.password === password) {
                currentUser = {
                  username,
                  passedLevels: data.passedLevels || [],
                  coins: data.coins || 0,
                };
                userCoins = data.coins || 0;
                coinCountEl.textContent = userCoins;
                showToast("🎉", "تم تسجيل الدخول بنجاح", "ok");

              } else {
                showToast("خطأ", "كلمة المرور غير صحيحة", "err");
              }
            } else {
              await set(userRef, { password, passedLevels: [], coins: 0 });
              currentUser = { username, passedLevels: [], coins: 0 };
              userCoins = 0;
              coinCountEl.textContent = 0;
              showToast("✅", "تم إنشاء الحساب", "ok");
              showLevels();

      function showLevels() {
        if (!currentUser) return;
        loginSection.style.display = "none";
        levelsDiv.style.display = "flex";
        logoutBtn.style.display = "inline-block";
        leaderboardBtn.style.display = "inline-block";
        levelsDiv.innerHTML = "";
        const passed = currentUser.passedLevels || [];
        const highest = passed.length ? Math.max(...passed) : 0;
        const encouragements = [
          "💪 يلا ورينا شطارتك!",
          "🚀 مستنيينك تكتاز المستوى ده",
          "🔥 معانا هتذاكر وتكسب كمان!",
          "🌟 أنت قادر على النجاح!",
          "⚡ استعد للتحدي!",
        ];
        Object.keys(levelsData).forEach((lvlStr) => {
          const lvl = +lvlStr;
          const card = document.createElement("div");
          card.className = "level-card";
          const price = lvl; // سعر المستوى
          const passPercent = Math.round(levelsData[lvl].passRate * 100);
          let icon = "";
          if (passed.includes(lvl)) {
            icon = "✅";
          } else if (lvl === highest + 1) {
            icon = "🔓";
          } else {
            icon = "🔒";
          }
          card.innerHTML = `
            <div>المستوى ${lvl} ${icon}</div>
          `;
          // Show modal on card click
          card.addEventListener("click", () => {
            selectedLevel = lvl;
            modalLevelNumber.textContent = lvl;
            modalPassRate.textContent = `نسبة النجاح المطلوبة: ${passPercent}%`;
            modalQuestionsCount.textContent = `عدد الأسئلة: ${levelsData[lvl].questions}`;
            modalEncouragement.textContent =
              encouragements[Math.floor(Math.random() * encouragements.length)];
            if (lvl > highest + 1) {
              modalPrice.style.display = "none";
              modalBuyBtn.style.display = "none";
              modalStartBtn.style.display = "none";
            } else {
              modalPrice.style.display = "none";
              modalBuyBtn.style.display = "none";
              modalStartBtn.style.display = "inline-block";
            }
            levelModal.style.display = "block";
          });
          if (passed.includes(lvl)) {
            card.classList.add("passed");
          } else if (lvl === highest + 1) {
            card.classList.add("open");
          } else {
            card.classList.add("locked");
          }
          levelsDiv.appendChild(card);
        });
      }

      function startLevel(level) {
        currentLevel = level;
        currentQuestions = structuredClone(questionsData[level] || []);
        currentQuestionIndex = 0;
        correctAnswers = 0;
        userAnswers = []; // Reset user answers
        tipEl.style.display = "none";
        timeLeft = levelsData[currentLevel].time;
        levelTimer = setInterval(updateTimer, 1000);
        // تحقق كلمة مرور للمستويات المحمية
        if (levelsData[level] && levelsData[level].password) {
          const password = prompt(`أدخل كلمة المرور للمستوى ${level}:`);
          if (password !== levelsData[level].password) {
            showToast("خطأ", "كلمة المرور غير صحيحة", "warn");
            clearInterval(levelTimer);
            levelTimer = null;
            showLevels();
            return;
          }
        }
        // أظهر واجهة الأسئلة
        levelsDiv.style.display = "none";
        questionBox.style.display = "block";
        leaderboardBtn.style.display = "none";
        renderQuestion();
      }

      // --- عرض سؤال ---
      function renderQuestion() {
        const q = currentQuestions[currentQuestionIndex];
        if (!q) {
          // آمن: لو ما فيه سؤال (مثلاً خطأ) => أنهِ المستوى
          endLevel();
          return;
        }
        document.getElementById("question-text").textContent = q.q;
        answersDiv.innerHTML = "";
        tipEl.style.display = "none";
        q.options.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.textContent = opt;
          btn.addEventListener("click", () => checkAnswer(i));
          answersDiv.appendChild(btn);
        });
      }

      function checkAnswer(i) {
        if (answering) return;
        answering = true;
        const q = currentQuestions[currentQuestionIndex];
        const buttons = answersDiv.querySelectorAll("button");
        buttons.forEach((b) => (b.disabled = true));

        // Track user answer
        userAnswers.push({
          questionIndex: currentQuestionIndex,
          userChoice: i,
          correct: i === q.answer,
        });

        if (i === q.answer) {
          correctAnswers++;
          showToast("✅", "إجابة صحيحة", "ok");
        } else {
          try {
            wrongSound.play();
          } catch (e) {}
          // فكرة 3: إظهار التلميح/الإجابة الصحيحة داخل الواجهة (بدون الخروج)
          tipEl.style.display = "block";
          tipEl.textContent = `💡 الإجابة الصحيحة: ${q.options[q.answer]} — ${
            q.tip || ""
          }`;
          showToast("❌", "إجابة خاطئة —  ذاكري تاني", "err");
        }

        // انتقل للسؤال التالي مع تحديث الخريطة
        setTimeout(() => {
          answering = false;
          currentQuestionIndex++;
          if (currentQuestionIndex < currentQuestions.length) {
            renderQuestion();
          } else {
            endLevel();
          }
        }, 900);
      }

      async function endLevel() {
        questionBox.style.display = "none";
        levelsDiv.style.display = "flex";

        const passRate = correctAnswers / (currentQuestions.length || 1);
        if (passRate >= levelsData[currentLevel].passRate) {
          if (!currentUser.passedLevels.includes(currentLevel)) {
            currentUser.passedLevels.push(currentLevel);
            userCoins += 1;
            coinCountEl.textContent = userCoins;
            // Floating coin animation
            const coinFloat = document.getElementById("coin-float");
            if (coinFloat) {
              coinFloat.textContent = "+1";
              coinFloat.classList.add("show");
              setTimeout(() => {
                coinFloat.classList.remove("show");
              }, 1000);
            }
            try {
              correctSound.play();
            } catch (e) {}
          }
          currentUser.coins = userCoins;
          try {
            await update(ref(db, "users/" + currentUser.username), {
              passedLevels: currentUser.passedLevels,
              coins: userCoins,
            });
            showToast("👏", "أحسنت! أنهيت المستوى " + currentLevel, "ok");
          } catch (e) {
            console.error(e);
            showToast("خطأ", "حدث خطأ أثناء حفظ النتائج", "err");
          }
          showLevels();
        } else {
          showToast(
            "خطأ",
            "لم تحقق النسبة المطلوبة (" +
              Math.round(levelsData[currentLevel].passRate * 100) +
              "%) حاول مرة أخرى",
            "warn"
          );
        }
      }

      // توست
      let toastTimer = null;
      function showToast(title, msg, type = "ok") {
        toastTitle.textContent = title;
        toastMsg.textContent = msg;
        toastEl.className =
          "toast show " +
          (type === "err" ? "err" : type === "warn" ? "warn" : "ok");
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2000);
      }

      // زر تسجيل خروج
      document.getElementById("logout-btn").addEventListener("click", () => {
        console.log("logout button clicked");
        if (currentUser) {
          update(ref(db, "users/" + currentUser.username), {
            coins: userCoins,
          }).catch((e) => console.error(e));
        }
        currentUser = null;
        userCoins = 0;
        coinCountEl.textContent = 0;
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
        loginSection.style.display = "block";
        levelsDiv.style.display = "none";
        questionBox.style.display = "none";
        resultSection.style.display = "none";
        leaderboardCard.style.display = "none";
        leaderboardCard.setAttribute("aria-hidden", "true");
        document.getElementById("logout-btn").style.display = "none";
        leaderboardBtn.style.display = "none";
        window.scrollTo(0, 0);
        showToast("✅", "تم تسجيل الخروج", "ok");
      });

      // لوحة المتصدرين
      leaderboardBtn.addEventListener("click", () => {
        leaderboardCard.style.display = "block";
        leaderboardCard.setAttribute("aria-hidden", "false");
        levelsDiv.style.display = "none";
        lbList.innerHTML = "جارٍ التحميل...";
        // Unsubscribe if already listening
        if (leaderboardUnsubscribe) {
          leaderboardUnsubscribe();
        }
        // Listen for real-time updates
        leaderboardUnsubscribe = onValue(ref(db, "users"), (snapshot) => {
          try {
            if (snapshot.exists()) {
              const users = Object.entries(snapshot.val()).map(([u, data]) => ({
                name: u,
                coins: data.coins || 0,
                levels: data.passedLevels || [],
              }));
              users.sort((a, b) => {
                const aCount = a.levels.length;
                const bCount = b.levels.length;
                if (aCount !== bCount) return bCount - aCount;
                return b.coins - a.coins;
              });
              lbList.innerHTML = "";
              users.forEach((user, idx) => {
                const div = document.createElement("div");
                div.className = "leader-user";
                if (idx === 0) div.classList.add("first-place");
                else if (idx === 1) div.classList.add("second-place");
                else if (idx === 2) div.classList.add("third-place");
                div.innerHTML = `
                  <div class="rank">${idx + 1}</div>
                  <div class="user-info">
                    <div class="user-name">${escapeHtml(user.name)}</div>
                    <div class="user-stats">مستويات: ${
                      user.levels.length
                    } | 💰 ${user.coins} جنيه</div>
                  </div>
                `;
                lbList.appendChild(div);
              });
            } else lbList.innerHTML = "لا يوجد متصدرين بعد.";
          } catch (e) {
            console.error(e);
            lbList.innerHTML = "حدث خطأ أثناء جلب المتصدرين.";
          }
        });
      });

      closeLeaderboardBtn.addEventListener("click", () => {
        closeLeaderboardBtn.blur();
        leaderboardCard.style.display = "none";
        leaderboardCard.setAttribute("aria-hidden", "true");
        levelsDiv.style.display = "flex";
      });

      backLevelsBtn.addEventListener("click", () => {
        questionBox.style.display = "none";
        levelsDiv.style.display = "flex";
        leaderboardBtn.style.display = "inline-block";
      });

      // أمان بسيط لمنع XSS في اسم المستخدم عند العرض
      function escapeHtml(unsafe) {
        return unsafe
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // init: nothing auto-logged in; ويمكن إضافة شاشة ترحيب لاحقاً
    </script>
  </body>
</html>
