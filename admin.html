<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>الادمن</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #007bff;
        --success: #28a745;
        --danger: #dc3545;
        --purple: #6f42c1;
        --bg: #f0f2f5;
      }
      * {
        box-sizing: border-box;
        font-family: "Tajawal", sans-serif;
        direction: rtl;
      }
      body {
        margin: 0;
        padding: 20px;
        background: var(--bg);
        color: #343a40;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }
      h1,
      h2 {
        text-align: center;
        color: var(--primary);
        margin-top: 0;
      }
      .section {
        border: 1px solid #ddd;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 25px;
        background: #fafafa;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
        color: #555;
      }
      select,
      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
        margin-bottom: 10px;
      }
      .btn-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 15px;
      }
      button {
        flex: 1;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        transition: 0.3s;
        color: white;
        min-width: 150px;
      }
      .btn-load {
        background: var(--primary);
      }
      .btn-save {
        background: var(--success);
      }
      .btn-delete {
        background: var(--danger);
      }
      .btn-back {
        background: #6c757d;
        max-width: 200px;
        margin: 20px auto;
        display: block;
        text-decoration: none;
        text-align: center;
        color: white;
        line-height: 45px;
        border-radius: 8px;
        font-weight: bold;
      }
      .toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        border-radius: 50px;
        color: white;
        display: none;
        z-index: 1000;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        font-weight: bold;
      }
      .status-bar {
        font-size: 13px;
        margin-top: 5px;
        color: #666;
        font-weight: bold;
        padding: 10px;
        background: #e9ecef;
        border-radius: 5px;
      }
      .badge {
        background: #007bff;
        color: white;
        padding: 2px 8px;
        border-radius: 10px;
        margin: 0 5px;
      }
      .success {
        background: #28a745 !important;
      }
      .info-box {
        background: #d4edda;
        border: 1px solid #c3e6cb;
        color: #155724;
        padding: 15px;
        border-radius: 8px;
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div
      id="loading-screen"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        z-index: 9999;
        font-family: &quot;Tajawal&quot;, sans-serif;
      "
    >
      <div style="font-size: 24px; margin-bottom: 20px">🔐 جاري التحقق...</div>
      <div
        style="
          width: 50px;
          height: 50px;
          border: 4px solid rgba(255, 255, 255, 0.3);
          border-top: 4px solid white;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        "
      ></div>
    </div>

    <style>
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>

    <div class="container" id="admin-panel" style="display: none">
      <h1>⚙️الادمن</h1>

      <div class="section">
        <h2>🏆 إدارة الجوائز لكل مستوى</h2>
        <label>اختر المستوى:</label>
        <div style="display: flex; gap: 10px">
          <select id="level-select-prizes">
            <script type="module">
              (async () => {
                try {
                  const module = await import("./questions.js");
                  const allLevelsQuestions = module.allLevelsQuestions;
                  const levels = Object.keys(allLevelsQuestions)
                    .map((n) => parseInt(n))
                    .filter((l) => l > 0)
                    .sort((a, b) => a - b);
                  levels.forEach((i) => {
                    const option = document.createElement("option");
                    option.value = i;
                    option.textContent = `المستوى ${i}`;
                    document
                      .querySelector("#level-select-prizes")
                      .appendChild(option);
                  });
                  console.log(`✅ Loaded ${levels.length} levels dynamically`);
                } catch (e) {
                  console.error("Failed to load levels:", e);
                  // Fallback hardcoded 1-15
                  for (let i = 1; i <= 15; i++) {
                    const option = document.createElement("option");
                    option.value = i;
                    option.textContent = `المستوى ${i}`;
                    document
                      .querySelector("#level-select-prizes")
                      .appendChild(option);
                  }
                }
              })();
            </script>
          </select>
          <button class="btn-load" id="btn-fetch-prizes">
            🔍 جلب الجائزة الحالية
          </button>
        </div>
        <div id="prizes-status" class="status-bar">اختر مستوى واضغط جلب...</div>

        <label>قيمة الجائزة (جنيه):</label>
        <input
          type="number"
          id="prize-input"
          placeholder="أدخل قيمة الجائزة"
          min="0"
        />

        <div class="btn-group">
          <button class="btn-save" id="btn-save-prize">💾 حفظ الجائزة</button>
          <button class="btn-delete" id="btn-reset-prize">
            🔄 إعادة افتراضي
          </button>
        </div>
      </div>

      <a href="index.html" class="btn-back">🏠 العودة للعبة الرئيسية</a>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
      // Password Protection
      function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          const char = str.charCodeAt(i);
          hash = (hash << 5) - hash + char;
          hash = hash & hash;
        }
        return Math.abs(hash).toString(16).padStart(8, "0");
      }

      const ADMIN_PASSWORD_HASH = "58a01f09"; // hash("11121999")
      const password = prompt("🔐 كلمة مرور لوحة الإدارة:");

      if (!password || simpleHash(password) !== ADMIN_PASSWORD_HASH) {
        alert("❌ خطأ في كلمة المرور!");
        setTimeout(() => (window.location.href = "index.html"), 2000);
      } else {
        document.getElementById("loading-screen").style.display = "none";
        document.getElementById("admin-panel").style.display = "block";
      }

      // Firebase for PRIZES ONLY
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        set,
        get,
        remove,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDrPR-5-IaSD7-ij1oj3Y4M9ARQBMK66eo",
        authDomain: "levels-409ba.firebaseapp.com",
        databaseURL: "https://levels-409ba-default-rtdb.firebaseio.com",
        projectId: "levels-409ba",
        storageBucket: "levels-409ba.firebasestorage.app",
        messagingSenderId: "54945336454",
        appId: "1:54945336454:web:51e6f513c1d2a91e23d507",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      const prizesLevelSelect = document.getElementById("level-select-prizes");
      const prizesStatus = document.getElementById("prizes-status");
      const prizeInput = document.getElementById("prize-input");

      function notify(msg, type = "success") {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.className = `toast ${type}`;
        toast.style.display = "block";
        setTimeout(() => (toast.style.display = "none"), 4000);
      }

      // Fetch Prize
      document.getElementById("btn-fetch-prizes").onclick = async () => {
        const level = prizesLevelSelect.value;
        prizesStatus.innerHTML = "⏳ جاري التحميل...";
        try {
          const snap = await get(ref(db, `prizes/${level}`));
          const prize = snap.val();
          prizeInput.value = prize || "";
          prizesStatus.innerHTML = prize
            ? `<span class="badge success">${prize} جنيه</span> ← الجائزة الحالية`
            : `<span class="badge">غير محددة (افتراضي)</span>`;
        } catch (e) {
          notify("خطأ: " + e.message, "error");
        }
      };

      // Save Prize
      document.getElementById("btn-save-prize").onclick = async () => {
        const level = prizesLevelSelect.value;
        const value = parseInt(prizeInput.value);
        if (isNaN(value) || value < 0)
          return notify("❌ رقم موجب فقط!", "error");
        try {
          await set(ref(db, `prizes/${level}`), value);
          notify(`✅ حفظ ${value} جنيه للمستوى ${level}!`);
          document.getElementById("btn-fetch-prizes").click();
        } catch (e) {
          notify("❌ خطأ الحفظ: " + e.message, "error");
        }
      };

      // Reset Prize
      document.getElementById("btn-reset-prize").onclick = async () => {
        const level = prizesLevelSelect.value;
        if (!confirm(`🔄 إعادة جائزة المستوى ${level} للافتراضي؟`)) return;
        try {
          await remove(ref(db, `prizes/${level}`));
          notify(`✅ إعادة افتراضي للمستوى ${level}`);
          prizeInput.value = "";
          document.getElementById("btn-fetch-prizes").click();
        } catch (e) {
          notify("❌ خطأ: " + e.message, "error");
        }
      };
    </script>
  </body>
</html>
